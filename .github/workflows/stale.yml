name: Stale Issues & PRs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed
            in 7 days unless there is new activity. Feel free to reopen
            if still relevant.
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed
            in 7 days unless there is new activity.
          close-issue-message: Closed due to inactivity.
          close-pr-message: Closed due to inactivity.
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security
