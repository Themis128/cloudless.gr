name: 🧪 Quick Test

on:
  pull_request:
    branches: [main, develop, application, platform]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - lint
          - type-check

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run linting
        if: inputs.test_type == 'all' || inputs.test_type == 'lint'
        run: npm run lint

      - name: Run type checking
        if: inputs.test_type == 'all' || inputs.test_type == 'type-check'
        run: npm run type-check

      - name: Run unit tests
        if: inputs.test_type == 'all' || inputs.test_type == 'unit'
        run: npm run test:unit

      - name: Run integration tests
        if: inputs.test_type == 'all' || inputs.test_type == 'integration'
        run: npm run test:integration

      - name: Test summary
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Type:** ${{ inputs.test_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY 