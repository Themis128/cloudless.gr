name: Docker Build & Test

on:
  push:
    branches:
      - main
      - develop
      - application
      - platform
    paths:
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.dockerignore'
  pull_request:
    branches:
      - main
      - develop
      - application
      - platform
    paths:
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.dockerignore'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build for'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

permissions:
  contents: read
  security-events: write
  actions: read

env:
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

jobs:
  docker-build-test:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [Dockerfile]
        include:
          - dockerfile: Dockerfile
            target: runner
            tag: runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Dockerfile exists
        id: check-dockerfile
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ ${{ matrix.dockerfile }} exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ ${{ matrix.dockerfile }} not found"
          fi

      - name: Set up Docker Buildx
        if: steps.check-dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Get version info
        if: steps.check-dockerfile.outputs.exists == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "git_branch=$GIT_BRANCH" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Build Docker image
        if: steps.check-dockerfile.outputs.exists == 'true'
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          tags: |
            cloudlessgr-app:${{ matrix.tag }}
            cloudlessgr-app:${{ matrix.tag }}-${{ steps.version.outputs.git_commit }}
            cloudlessgr-app:v${{ steps.version.outputs.version }}-${{ matrix.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            GIT_BRANCH=${{ steps.version.outputs.git_branch }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            NODE_ENV=${{ matrix.target }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        if: steps.check-dockerfile.outputs.exists == 'true' && steps.build-image.outcome == 'success'
        run: |
          echo "🧪 Testing Docker image..."

          # Check if image exists
          if ! docker image inspect cloudlessgr-app:${{ matrix.tag }} > /dev/null 2>&1; then
            echo "❌ Docker image cloudlessgr-app:${{ matrix.tag }} not found"
            echo "📋 Available images:"
            docker images | grep cloudlessgr-app || echo "No cloudlessgr-app images found"
            exit 1
          fi

          echo "✅ Docker image found, testing container startup..."

          # Test container startup
          docker run --rm -d --name test-container cloudlessgr-app:${{ matrix.tag }}

          # Wait for container to start
          sleep 10

          # Check if container is running
          if docker ps | grep -q test-container; then
            echo "✅ Container started successfully"
          else
            echo "❌ Container failed to start"
            docker logs test-container
            exit 1
          fi

          # Test health endpoint (if available)
          if [ "${{ matrix.target }}" = "runner" ]; then
            echo "🔍 Testing health endpoint..."
            # Note: This would need the container to expose port 3000
            # docker run --rm --network host cloudlessgr-app:${{ matrix.tag }} curl -f http://localhost:3000/api/health || echo "Health check not available"
          fi

          # Cleanup
          docker stop test-container || true

      - name: Skip build message
        if: steps.check-dockerfile.outputs.exists == 'false'
        run: |
          echo "⏭️ Skipping build for ${{ matrix.dockerfile }} - file not found"

  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: docker-build-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build development environment
        run: |
          echo "🐳 Building development environment..."
          docker compose -f docker-compose.dev.yml build

      - name: Test development environment
        run: |
          echo "🧪 Testing development environment..."

          # Start services
          docker compose -f docker-compose.dev.yml up -d

          # Wait for services to be ready
          sleep 30

          # Check service status
          docker compose -f docker-compose.dev.yml ps

          # Test Redis connection
          docker compose -f docker-compose.dev.yml exec -T redis-dev redis-cli ping

          # Test application health (if available)
          # curl -f http://localhost:3000/api/health || echo "Health check not available"

          # Stop services
          docker compose -f docker-compose.dev.yml down

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: docker-build-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check for available images
        id: check-images
        run: |
          echo "🔍 Checking for available Docker images..."
          docker images | grep cloudlessgr-app || echo "No cloudlessgr-app images found"

          # Check if runner image exists (preferred for security scanning)
          if docker image inspect cloudlessgr-app:runner > /dev/null 2>&1; then
            echo "✅ Found cloudlessgr-app:runner image"
            echo "image_to_scan=cloudlessgr-app:runner" >> $GITHUB_OUTPUT
          elif docker image inspect cloudlessgr-app:dev > /dev/null 2>&1; then
            echo "✅ Found cloudlessgr-app:dev image"
            echo "image_to_scan=cloudlessgr-app:dev" >> $GITHUB_OUTPUT
          elif docker image inspect cloudlessgr-app:latest > /dev/null 2>&1; then
            echo "✅ Found cloudlessgr-app:latest image"
            echo "image_to_scan=cloudlessgr-app:latest" >> $GITHUB_OUTPUT
          else
            echo "❌ No suitable image found for scanning"
            echo "📋 Available images:"
            docker images | grep cloudlessgr-app || echo "No cloudlessgr-app images found"
            echo "image_to_scan=" >> $GITHUB_OUTPUT
          fi

      - name: Build image for scanning if needed
        if: steps.check-images.outputs.image_to_scan == ''
        run: |
          echo "🔨 Building image for security scanning..."

          # Get version info
          VERSION=$(node -p "require('./package.json').version")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Build the runner image
          docker build \
            --target runner \
            --tag cloudlessgr-app:runner \
            --build-arg VERSION="$VERSION" \
            --build-arg GIT_COMMIT="$GIT_COMMIT" \
            --build-arg GIT_BRANCH="$GIT_BRANCH" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --build-arg NODE_ENV=production \
            -f Dockerfile .

          echo "✅ Built cloudlessgr-app:runner for scanning"
          echo "image_to_scan=cloudlessgr-app:runner" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        if: steps.check-images.outputs.image_to_scan != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.check-images.outputs.image_to_scan }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && steps.check-images.outputs.image_to_scan != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Skip security scan message
        if: steps.check-images.outputs.image_to_scan == ''
        run: |
          echo "⏭️ Skipping security scan - no suitable Docker image found"
          echo "📋 This usually means the Docker build step failed or no images were created"

  docker-push:
    name: Push to Registry
    runs-on: ubuntu-latest
    needs: [docker-build-test, docker-compose-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/application'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "git_branch=$GIT_BRANCH" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/cloudlessgr-app:latest
            ${{ secrets.DOCKER_REGISTRY }}/cloudlessgr-app:v${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_REGISTRY }}/cloudlessgr-app:${{ steps.version.outputs.git_commit }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            GIT_BRANCH=${{ steps.version.outputs.git_branch }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push development image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          target: dev
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/cloudlessgr-app:dev
            ${{ secrets.DOCKER_REGISTRY }}/cloudlessgr-app:dev-${{ steps.version.outputs.git_commit }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            GIT_BRANCH=${{ steps.version.outputs.git_branch }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            NODE_ENV=development
          cache-from: type=gha
          cache-to: type=gha,mode=max
