name: Stripe → Notion Orders Sync

on:
  schedule:
    # Every day at 06:30 UTC (08:30 Athens time)
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: stripe-notion-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Sync Stripe orders to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: production
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_ORDERS_DB_ID: ${{ secrets.NOTION_ORDERS_DB_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Stripe → Notion orders sync
        run: pnpm exec tsx --tsconfig scripts/tsconfig.json scripts/stripe-notion-sync.ts

      - name: Summary
        if: always()
        run: |
          echo "### 💳 Stripe → Notion Orders Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run at | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"
