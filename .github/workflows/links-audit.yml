name: Broken Links Audit

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Markdown Link Checker
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,301,302,303,307,308,429
            "README.md" "docs/**/*.md" ".github/**/*.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
