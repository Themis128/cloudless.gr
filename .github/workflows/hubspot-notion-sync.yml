name: HubSpot → Notion CRM Sync

on:
  schedule:
    # Every day at 06:00 UTC (08:00 Athens time)
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: hubspot-notion-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Sync HubSpot contacts to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: production
      HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_CRM_SYNC_DB_ID: ${{ secrets.NOTION_CRM_SYNC_DB_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run HubSpot → Notion CRM sync
        run: pnpm exec tsx --tsconfig scripts/tsconfig.json scripts/hubspot-notion-sync.ts

      - name: Summary
        if: always()
        run: |
          echo "### 🔗 HubSpot → Notion CRM Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run at | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"
