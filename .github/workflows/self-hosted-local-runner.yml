name: '🚀 Self-Hosted Local Runner Service CI/CD Pipeline'

on:
  push:
    branches: [main, master, develop, application, platform]
    tags: ['v*']
  pull_request:
    branches: [main, develop, application, platform]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip testing phases'
        required: false
        default: false
        type: boolean
      skip_deployment:
        description: 'Skip deployment phase'
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: 'Force rebuild all caches'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write
  security-events: write
  id-token: write
  actions: read

env:
  NODE_VERSION: '20'
  NODE_ENV: 'test'
  REGISTRY: ghcr.io
  IMAGE_NAME: themis128/cloudless.gr
  CACHE_DEPENDENCY_PATH: '**/package-lock.json'
  DOCKER_BUILDKIT: '1'
  ACTIONS_STEP_DEBUG: 'false'
  DEBUG: 'nuxt:*'
  NODE_OPTIONS: '--max-old-space-size=4096'
  NPM_CONFIG_LOGLEVEL: 'warn'
  NPM_CONFIG_CACHE: '.npm-cache'
  NPM_CONFIG_PREFER_OFFLINE: 'true'

concurrency:
  group: self-hosted-local-runner-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # =============================================================================
  # VALIDATION & PREPARATION (Self-hosted)
  # =============================================================================
  validate:
    name: 🔍 Validate Configuration (Local Runner)
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      should-skip: ${{ steps.skip-check.outputs.should-skip }}
      has-changes: ${{ steps.changes-check.outputs.has-changes }}
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cache key
        id: cache-key
        run: |
          CACHE_KEY="node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT

      - name: Check for skip patterns
        id: skip-check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should-skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null || echo "")
          
          if [ -n "$CHANGED_FILES" ]; then
            DOC_FILES=$(echo "$CHANGED_FILES" | grep -E '\.(md|txt|yml|yaml)$' | wc -l)
            CODE_FILES=$(echo "$CHANGED_FILES" | grep -vE '\.(md|txt|yml|yaml)$' | wc -l)
            
            if [ "$DOC_FILES" -gt 0 ] && [ "$CODE_FILES" -eq 0 ]; then
              echo "should-skip=true" >> $GITHUB_OUTPUT
              echo "🔄 Skipping CI - only documentation changes"
            else
              echo "should-skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: changes-check
        run: |
          echo "has-changes=true" >> $GITHUB_OUTPUT

      - name: Validate package.json
        if: steps.skip-check.outputs.should-skip != 'true'
        run: |
          node -e "
            const pkg = require('./package.json');
            const required = ['name', 'version', 'scripts'];
            const missing = required.filter(field => !pkg[field]);
            if (missing.length > 0) {
              console.error('Missing required fields:', missing);
              process.exit(1);
            }
            console.log('✅ Package.json validation passed');
          "

      - name: Check for critical files
        if: steps.skip-check.outputs.should-skip != 'true'
        run: |
          for file in package.json nuxt.config.ts tsconfig.json; do
            if [ ! -f "$file" ]; then
              echo "❌ Critical file missing: $file"
              exit 1
            fi
          done
          echo "✅ All critical files found"

  # =============================================================================
  # DEPENDENCY MANAGEMENT (Self-hosted)
  # =============================================================================
  dependencies:
    name: 📦 Dependency Management
    runs-on: [self-hosted, containerized, dev]
    needs: validate
    if: needs.validate.outputs.should-skip != 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with optimized cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .npm-cache
          key: ${{ needs.validate.outputs.cache-key }}
          restore-keys: |
            node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit || {
            echo "⚠️ npm ci failed, trying npm install"
            npm install --prefer-offline --no-audit
          }

      - name: Run dependency audit
        run: |
          npm audit --audit-level=high --json > audit.json || {
            echo "⚠️ Security vulnerabilities found"
            cat audit.json | jq -r '.vulnerabilities | to_entries[] | "\(.key): \(.value.severity)"' || true
          }

      - name: Check for outdated packages
        run: |
          npm outdated --depth=0 || echo "✅ All packages are up to date"

  # =============================================================================
  # SECURITY & QUALITY (Self-hosted)
  # =============================================================================
  security-quality:
    name: 🔒 Security & Quality
    runs-on: [self-hosted, containerized, dev]
    needs: [validate, dependencies]
    if: needs.validate.outputs.should-skip != 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.validate.outputs.cache-key }}
          restore-keys: |
            node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run security scan
        run: |
          echo "🔍 Running security scan..."
          chmod +x scripts/security/run-secrets-scan.sh
          ./scripts/security/run-secrets-scan.sh || {
            echo "❌ Security scan failed"
            exit 1
          }

      - name: Run linting
        run: |
          npm run lint

      - name: Run type checking
        run: |
          npx tsc --noEmit --skipLibCheck

  # =============================================================================
  # BUILD & TEST (Self-hosted with Docker fixes)
  # =============================================================================
  build-test:
    name: 🏗️ Build & Test (Self-hosted)
    runs-on: [self-hosted, containerized, dev]
    needs: [validate, security-quality]
    if: needs.validate.outputs.should-skip != 'true'
    timeout-minutes: 45
    strategy:
      matrix:
        dockerfile: [scripts/docker/Dockerfile, scripts/docker/Dockerfile.dev]
        include:
          - dockerfile: scripts/docker/Dockerfile
            target: runner
            tag: runner
          - dockerfile: scripts/docker/Dockerfile.dev
            target: dev
            tag: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Dockerfile exists
        id: check-dockerfile
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Dockerfile found: ${{ matrix.dockerfile }}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ Dockerfile not found: ${{ matrix.dockerfile }}"
          fi

      - name: Pre-build Docker cleanup
        if: steps.check-dockerfile.outputs.exists == 'true'
        run: |
          echo "🧹 Pre-build Docker cleanup..."
          docker ps -aq | xargs -r docker rm -f || true
          docker image prune -f || true
          docker volume prune -f || true
          docker network prune -f || true
          echo "✅ Docker cleanup completed"

      - name: Set up Docker Buildx
        if: steps.check-dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Cache Docker layers
        if: steps.check-dockerfile.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image (with timeout and debugging)
        if: steps.check-dockerfile.outputs.exists == 'true'
        run: |
          echo "🐳 Starting Docker build with enhanced debugging..."
          echo "🔧 Build context: $(pwd)"
          echo "🔧 Dockerfile: ${{ matrix.dockerfile }}"
          echo "🔧 Target: ${{ matrix.target }}"
          echo "🔧 Tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test"
          echo "🔧 Docker version: $(docker --version)"
          echo "🔧 Available disk space: $(df -h . | tail -1)"
          echo "🔧 Available memory: $(free -h | head -2 | tail -1)"
          
          set -x
          
          timeout 1800 docker build \
            --file ./${{ matrix.dockerfile }} \
            --target ${{ matrix.target }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test \
            --build-arg NODE_ENV=production \
            --build-arg BUILD_DATE=${{ github.event.head_commit.timestamp }} \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg APP_VERSION=${{ github.ref_name }} \
            --progress=plain \
            --no-cache \
            . || {
              echo "❌ Docker build failed or timed out!"
              echo "🔧 Checking Docker daemon status..."
              docker system df || echo "Cannot check Docker system"
              echo "🔧 Checking for hanging processes..."
              ps aux | grep docker || echo "No docker processes found"
              echo "🔧 Checking Docker logs..."
              journalctl -u docker --no-pager -n 50 || echo "Cannot access Docker logs"
              exit 1
            }
          
          echo "✅ Docker build completed successfully"
          echo "🔧 Built image size: $(docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test --format '{{.Size}}' 2>/dev/null || echo 'unknown')"

      - name: Test Docker image (with timeout)
        if: steps.check-dockerfile.outputs.exists == 'true'
        run: |
          echo "🧪 Testing Docker image..."
          timeout 300 docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test npm test || {
            echo "⚠️ Docker tests failed or timed out, but continuing..."
          }

      - name: Post-build cleanup
        if: always()
        run: |
          echo "🧹 Post-build cleanup..."
          docker ps -aq | xargs -r docker rm -f || true
          docker image prune -f || true
          echo "✅ Post-build cleanup completed"

  # =============================================================================
  # INTEGRATION TESTING (Self-hosted)
  # =============================================================================
  integration-tests:
    name: 🔄 Integration Tests
    runs-on: [self-hosted, containerized, dev]
    needs: [validate, build-test]
    if: needs.validate.outputs.should-skip != 'true' && github.event.inputs.skip_tests != 'true'
    timeout-minutes: 20
    strategy:
      matrix:
        test-type: [api, bot, pipeline, llm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.validate.outputs.cache-key }}
          restore-keys: |
            node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Setup test environment
        run: |
          cp env.example .env
          echo "NODE_ENV=test" >> .env
          echo "JWT_SECRET=test-secret-key" >> .env
          echo "NUXT_PUBLIC_SUPABASE_URL=https://test.supabase.co" >> .env
          echo "NUXT_PUBLIC_SUPABASE_ANON_KEY=test-anon-key" >> .env

      - name: Build application
        run: npm run build

      - name: Start application (with timeout)
        run: |
          npm run start > app.log 2>&1 &
          APP_PID=$!
          
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ Application started"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Application failed to start within timeout"
              cat app.log
              exit 1
            fi
            sleep 2
          done

      - name: Run ${{ matrix.test-type }} tests
        run: |
          echo "🧪 Running ${{ matrix.test-type }} tests..."
          
          case "${{ matrix.test-type }}" in
            "api")
              curl -f http://localhost:3000/api/v1 || exit 1
              curl -f http://localhost:3000/api/health || exit 1
              ;;
            "bot")
              curl -f http://localhost:3000/api/v1/bots || exit 1
              ;;
            "pipeline")
              curl -f http://localhost:3000/api/pipelines/run || exit 1
              ;;
            "llm")
              curl -f http://localhost:3000/api/models/train || exit 1
              ;;
          esac

  # =============================================================================
  # DEPLOYMENT (Self-hosted)
  # =============================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: [self-hosted, containerized, dev]
    needs: [validate, build-test]
    if: |
      needs.validate.outputs.should-skip != 'true' &&
      github.event.inputs.skip_deployment != 'true' &&
      (github.ref == 'refs/heads/develop' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'))
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.validate.outputs.cache-key }}
          restore-keys: |
            node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: .output/
          retention-days: 7

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging..."
          # Add your staging deployment logic here

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: [self-hosted, containerized, dev]
    needs: [validate, build-test]
    if: |
      needs.validate.outputs.should-skip != 'true' &&
      github.event.inputs.skip_deployment != 'true' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'))
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ github.ref_name }}

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          # Add your production deployment logic here

  # =============================================================================
  # POST-DEPLOYMENT (Self-hosted)
  # =============================================================================
  post-deployment:
    name: 📊 Post-Deployment
    runs-on: [self-hosted, containerized, dev]
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security scan
        run: |
          echo "🔒 Running post-deployment security scan..."
          # Add security scanning logic

      - name: Monitor deployment
        run: |
          echo "📊 Monitoring deployment..."
          # Add monitoring logic

  # =============================================================================
  # START DEV CONTAINERS (After Success)
  # =============================================================================
  start-dev-containers:
    name: 🚀 Start Local Dev Containers
    runs-on: [self-hosted, containerized, dev]
    needs: [
      validate,
      dependencies,
      security-quality,
      build-test,
      integration-tests
    ]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      needs.dependencies.result == 'success' &&
      needs.security-quality.result == 'success' &&
      needs.build-test.result == 'success' &&
      needs.integration-tests.result == 'success' &&
      github.ref == 'refs/heads/develop'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if dev containers are already running
        id: check-dev-containers
        run: |
          echo "🔍 Checking if dev containers are already running..."
          
          # Check if app-dev container is running
          if docker ps --filter "name=cloudlessgr-app-dev" --format "{{.Names}}" | grep -q "cloudlessgr-app-dev"; then
            echo "already-running=true" >> $GITHUB_OUTPUT
            echo "✅ Dev containers are already running"
          else
            echo "already-running=false" >> $GITHUB_OUTPUT
            echo "❌ Dev containers are not running"
          fi

      - name: Stop existing dev containers (if running)
        if: steps.check-dev-containers.outputs.already-running == 'true'
        run: |
          echo "🛑 Stopping existing dev containers..."
          docker-compose -f scripts/docker/docker-compose.dev.yml down
          echo "✅ Existing dev containers stopped"

      - name: Start dev containers
        if: steps.check-dev-containers.outputs.already-running == 'false'
        run: |
          echo "🚀 Starting local dev containers..."
          
          # Set environment variables if needed
          if [ ! -f ".env" ]; then
            echo "📝 Creating .env file from template..."
            cp env.example .env || echo "⚠️ Could not copy env.example, continuing..."
          fi
          
          # Start dev containers
          docker-compose -f scripts/docker/docker-compose.dev.yml up -d
          
          if [ $? -eq 0 ]; then
            echo "✅ Dev containers started successfully!"
          else
            echo "❌ Failed to start dev containers"
            exit 1
          fi

      - name: Wait for dev containers to be ready
        if: steps.check-dev-containers.outputs.already-running == 'false'
        run: |
          echo "⏳ Waiting for dev containers to be ready..."
          
          # Wait for app to be healthy
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ App is ready and responding!"
              break
            fi
            
            if [ $i -eq 30 ]; then
              echo "❌ App failed to start within timeout"
              echo "📊 Container status:"
              docker ps --filter "name=cloudlessgr" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
              echo "📋 App logs:"
              docker logs cloudlessgr-app-dev --tail 20 || echo "Could not get app logs"
              exit 1
            fi
            
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done

      - name: Verify dev environment
        if: steps.check-dev-containers.outputs.already-running == 'false'
        run: |
          echo "🔍 Verifying dev environment..."
          
          # Check all containers are running
          echo "📊 Container Status:"
          docker ps --filter "name=cloudlessgr" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          
          # Test key endpoints
          echo "🧪 Testing endpoints:"
          curl -f http://localhost:3000/api/health && echo "✅ Health check passed"
          curl -f http://localhost:3000/api/v1 && echo "✅ API v1 endpoint working"
          
          # Check Redis connection
          if docker exec cloudlessgr-redis-dev redis-cli ping | grep -q "PONG"; then
            echo "✅ Redis is working"
          else
            echo "⚠️ Redis connection failed"
          fi
          
          # Check PostgreSQL connection
          if docker exec cloudlessgr-postgres-dev pg_isready -U cloudless; then
            echo "✅ PostgreSQL is working"
          else
            echo "⚠️ PostgreSQL connection failed"
          fi

      - name: Display dev environment info
        run: |
          echo "🎉 Local Dev Environment is Ready!"
          echo "=================================="
          echo ""
          echo "🌐 Application URLs:"
          echo "  • Main App: http://localhost:3000"
          echo "  • API Health: http://localhost:3000/api/health"
          echo "  • API v1: http://localhost:3000/api/v1"
          echo ""
          echo "🔧 Development Tools:"
          echo "  • Node.js Debugger: localhost:9229"
          echo "  • Redis: localhost:6379"
          echo "  • PostgreSQL: localhost:5432"
          echo ""
          echo "📊 Container Status:"
          docker ps --filter "name=cloudlessgr" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "📋 Useful Commands:"
          echo "  • View logs: docker logs -f cloudlessgr-app-dev"
          echo "  • Stop dev: docker-compose -f scripts/docker/docker-compose.dev.yml down"
          echo "  • Restart: docker-compose -f scripts/docker/docker-compose.dev.yml restart"
          echo ""
          echo "🎯 All tests passed! Your dev environment is ready for development."

  # =============================================================================
  # SUMMARY (Self-hosted)
  # =============================================================================
  summary:
    name: 📋 Pipeline Summary
    runs-on: [self-hosted, containerized, dev]
    needs: [
      validate,
      dependencies,
      security-quality,
      build-test,
      integration-tests,
      deploy-staging,
      deploy-production,
      post-deployment,
      start-dev-containers
    ]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Cache cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up caches..."
          npm cache clean --force || true

      - name: Generate summary
        run: |
          echo "🎉 Self-Hosted CI/CD Pipeline Summary"
          echo "====================================="
          echo ""
          echo "📊 Job Status:"
          echo "🔍 validate: ${{ needs.validate.result || 'UNKNOWN' }}"
          echo "📦 dependencies: ${{ needs.dependencies.result || 'UNKNOWN' }}"
          echo "🔒 security-quality: ${{ needs.security-quality.result || 'UNKNOWN' }}"
          echo "🏗️ build-test: ${{ needs.build-test.result || 'UNKNOWN' }}"
          echo "🔄 integration-tests: ${{ needs.integration-tests.result || 'UNKNOWN' }}"
          echo "🚀 deploy-staging: ${{ needs.deploy-staging.result || 'UNKNOWN' }}"
          echo "🚀 deploy-production: ${{ needs.deploy-production.result || 'UNKNOWN' }}"
          echo "📊 post-deployment: ${{ needs.post-deployment.result || 'UNKNOWN' }}"
          echo "🚀 start-dev-containers: ${{ needs.start-dev-containers.result || 'UNKNOWN' }}"
          echo ""
          echo "🔧 Self-Hosted Runner Benefits:"
          echo "✅ No billing limits"
          echo "✅ Faster execution"
          echo "✅ Custom environment"
          echo "✅ Docker optimization"
          echo "✅ Auto-start dev containers"
          echo ""
          echo "⏱️ Pipeline completed at: $(date)" 