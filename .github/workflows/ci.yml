name: CI/CD Pipeline

on:
  push:
    branches:
      - application
      - main
      - develop
  pull_request:
    branches:
      - application
      - main

permissions:
  contents: read
  checks: read
  pull-requests: write

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Check TypeScript types
        run: npx nuxi typecheck
        continue-on-error: true

      - name: Lint with ESLint
        run: npx eslint . --ext .vue,.js,.ts,.jsx,.tsx --max-warnings 0
        continue-on-error: true

      - name: Check code formatting
        run: npx prettier --check .
        continue-on-error: true

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Test build output
        run: |
          echo "🔍 Checking build output..."

          # List current directory contents
          echo "📁 Current directory contents:"
          ls -la

          # Check if build output exists
          if [ ! -d ".output" ]; then
            echo "❌ Build output directory not found"
            echo "📁 Available directories:"
            ls -la | grep "^d"
            exit 1
          fi

          # List .output contents
          echo "📁 .output directory contents:"
          ls -la .output/

          # Check for different possible server file locations
          if [ -f ".output/server/index.mjs" ]; then
            echo "✅ Found server file at .output/server/index.mjs"
          elif [ -f ".output/server/index.js" ]; then
            echo "✅ Found server file at .output/server/index.js"
          elif [ -f ".output/server/index.cjs" ]; then
            echo "✅ Found server file at .output/server/index.cjs"
          else
            echo "❌ Server build file not found in expected locations"
            echo "📁 Server directory contents:"
            if [ -d ".output/server" ]; then
              ls -la .output/server/
            else
              echo "Server directory does not exist"
            fi
            exit 1
          fi

          # Check for client files
          if [ -d ".output/public" ]; then
            echo "✅ Found public directory"
            echo "📁 Public directory contents:"
            ls -la .output/public/ | head -10
          fi

          echo "✅ Build test passed for Node.js ${{ matrix.node-version }}"

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Run npm audit
        run: npm audit --audit-level moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: npx audit-ci --moderate
        continue-on-error: true

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated
        continue-on-error: true

      - name: Validate package.json
        run: npm run build --dry-run
        continue-on-error: true

  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps
        continue-on-error: true

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  accessibility-test:
    name: Accessibility Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps
        continue-on-error: true

      - name: Run accessibility tests
        run: |
          # Start server with logging
          node .output/server/index.mjs > server.log 2>&1 &
          SERVER_PID=$!

          # Wait briefly for server to attempt startup
          sleep 5

          # Check if server is still running
          if ps -p $SERVER_PID > /dev/null; then
            echo "✅ Server is still running (PID: $SERVER_PID)"
            sleep 10
          else
            echo "❌ Server crashed. Logs:"
            cat server.log
            exit 1
          fi

          # Test if server is responding
          if curl -f -s --connect-timeout 10 http://127.0.0.1:3000 > /dev/null 2>&1; then
            echo "✅ Server is responding on 127.0.0.1:3000"
          else
            echo "❌ Server is not responding"
            echo "📋 Server logs:"
            cat server.log
            exit 1
          fi

          # Run accessibility checks
          npx playwright test tests/basic.spec.js --grep "accessibility"

          # Kill server
          kill $SERVER_PID
        continue-on-error: true

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Analyze bundle size
        run: |
          # Check build output size
          if [ -d ".output" ]; then
            echo "📊 Build output size:"
            du -sh .output/
            
            # Check for large files
            find .output/ -type f -size +1M -exec ls -lh {} \;
          fi

          echo "✅ Performance analysis completed"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Test preview server
        env:
          NODE_ENV: production
          NITRO_HOST: 0.0.0.0
          NITRO_PORT: 3000
          NITRO_LOG_LEVEL: debug
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          # Ensure curl and lsof are available for integration tests
          sudo apt-get update && sudo apt-get install -y curl lsof

          # Debug environment variables
          echo "🔍 Environment variables check:"
          echo "NODE_ENV: $NODE_ENV"
          echo "NITRO_HOST: $NITRO_HOST"
          echo "NITRO_PORT: $NITRO_PORT"
          echo "NITRO_LOG_LEVEL: $NITRO_LOG_LEVEL"
          echo "NUXT_PUBLIC_SUPABASE_URL: $NUXT_PUBLIC_SUPABASE_URL"
          echo "NUXT_PUBLIC_SUPABASE_ANON_KEY: ${NUXT_PUBLIC_SUPABASE_ANON_KEY:0:20}..."

          # Print all environment variables for debugging
          echo "🔍 All environment variables:"
          env | grep -E "(NITRO|NUXT|SUPABASE|NODE)" | sort

          # Run environment debug script
          echo "🔍 Running environment debug script..."
          node test-env-debug.js

          # Check file permissions
          echo "🔍 File permissions check:"
          ls -la .output/server/index.mjs
          ls -la .output/server/node_modules | head -5

          # Make the debug scripts executable
          chmod +x test-integration-debug.sh
          chmod +x test-nitro-debug.sh

          # Run the comprehensive Nitro debug script as primary test
          ./test-nitro-debug.sh
        continue-on-error: false

      - name: Fallback comprehensive Nitro debug
        if: failure()
        env:
          NODE_ENV: production
          NITRO_HOST: 0.0.0.0
          NITRO_PORT: 3000
          NITRO_LOG_LEVEL: debug
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "🔄 Primary test failed, running comprehensive Nitro debug..."

          # Make the debug script executable
          chmod +x test-nitro-debug.sh

          # Run the comprehensive Nitro debug script
          ./test-nitro-debug.sh
        continue-on-error: false

      - name: Fallback simple integration test
        if: failure()
        run: |
          echo "🔄 Comprehensive debug failed, trying simple fallback test..."

          # Make the integration test script executable
          chmod +x test-integration.sh

          # Run the simple integration test
          ./test-integration.sh
        continue-on-error: false

      - name: Basic server test
        if: failure()
        run: |
          echo "🔄 Both tests failed, trying basic server test..."

          # Try basic server startup
          node .output/server/index.mjs &
          sleep 5
          curl -f http://localhost:3000 || exit 1
        continue-on-error: true

      - name: Node.js debug test
        if: failure()
        run: |
          echo "🔄 All tests failed, running Node.js debug test..."

          # Run the Node.js debug script
          node test-server-debug.js
        continue-on-error: true

      - name: Direct server test
        if: failure()
        run: |
          echo "🔄 All tests failed, running direct server test..."

          # Run the direct server test
          node test-server-direct.js
        continue-on-error: true

      - name: ES Module test
        if: failure()
        run: |
          echo "🔄 All tests failed, running ES Module test..."

          # Run the ES Module test
          node test-server-esm.js
        continue-on-error: true

      - name: Verbose Node.js error test
        if: failure()
        env:
          NODE_ENV: production
          NITRO_HOST: 0.0.0.0
          NITRO_PORT: 3000
          NITRO_LOG_LEVEL: debug
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "🔄 All tests failed, running verbose Node.js error test..."

          # Print environment variables for debugging
          echo "🔍 Environment variables:"
          env | grep -E "(NITRO|NUXT|SUPABASE|NODE)" | sort

          # Show Node.js errors with full stack traces and --trace-uncaught
          echo "Running server with verbose error output and --trace-uncaught..."
          node --trace-uncaught --trace-warnings .output/server/index.mjs
        continue-on-error: true

      - name: Startup error handler test
        if: failure()
        env:
          NODE_ENV: production
          NITRO_HOST: 0.0.0.0
          NITRO_PORT: 3000
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "🔄 All tests failed, running startup error handler test..."

          # Run the startup error handler script
          node test-server-startup.js
        continue-on-error: true

      - name: Direct Nitro server debug
        if: failure()
        env:
          NODE_ENV: production
          NITRO_HOST: 0.0.0.0
          NITRO_PORT: 3000
          NITRO_LOG_LEVEL: debug
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "🔄 All tests failed, running direct Nitro server debug..."

          # Debug environment variables
          echo "🔍 Environment variables check:"
          echo "NODE_ENV: $NODE_ENV"
          echo "NITRO_HOST: $NITRO_HOST"
          echo "NITRO_PORT: $NITRO_PORT"
          echo "NITRO_LOG_LEVEL: $NITRO_LOG_LEVEL"
          echo "NUXT_PUBLIC_SUPABASE_URL: $NUXT_PUBLIC_SUPABASE_URL"
          echo "NUXT_PUBLIC_SUPABASE_ANON_KEY: ${NUXT_PUBLIC_SUPABASE_ANON_KEY:0:20}..."

          # Check file permissions and dependencies
          echo "🔍 File permissions check:"
          ls -la .output/server/index.mjs
          echo "🔍 Node modules check:"
          ls -la .output/server/node_modules | head -10

          # Try direct server execution with full error capture
          echo "🧪 Direct Nitro server execution with full error capture..."
          timeout 30s node --trace-warnings --trace-uncaught .output/server/index.mjs 2>&1 || {
            echo "❌ Server failed with exit code $?"
            echo "📋 Full output captured above"
          }
        continue-on-error: true

  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint-and-check, build-test, security-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Build for preview
        run: npm run build
        continue-on-error: true

      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const lintResult = '${{ needs.lint-and-check.result }}';
            const buildResult = '${{ needs.build-test.result }}';
            const securityResult = '${{ needs.security-check.result }}';

            const allPassed = lintResult === 'success' && buildResult === 'success' && securityResult === 'success';

            const status = allPassed ? '✅' : '❌';
            const statusText = allPassed ? 'Preview build completed successfully!' : 'Preview build failed!';

            const checks = [
              { name: 'Lint & Type Check', result: lintResult },
              { name: 'Build Test', result: buildResult },
              { name: 'Security Check', result: securityResult }
            ];

            const checkList = checks.map(check => {
              const icon = check.result === 'success' ? '✅' : '❌';
              return `- ${icon} ${check.name}`;
            }).join('\n');

            const body = `## 🚀 CI/CD Pipeline Results

            **Status:** ${status} ${statusText}

            ### Checks:
            ${checkList}

            ---
            ${allPassed ? '**Preview build completed successfully! Ready for review.**' : '**Please check the failed checks above and fix the issues.**'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      [
        lint-and-check,
        build-test,
        security-check,
        dependency-check,
        e2e-test,
        accessibility-test,
        performance-test,
        integration-test,
      ]
    if: always()
    steps:
      - name: Generate test summary
        run: |
          echo "📊 Test Summary for ${{ github.sha }}"
          echo "✅ All test jobs completed"
          echo "📈 Check the individual job results above for detailed information"

          # Simple status check
          if [ "${{ needs.lint-and-check.result }}" = "success" ] && \
             [ "${{ needs.build-test.result }}" = "success" ] && \
             [ "${{ needs.security-check.result }}" = "success" ]; then
            echo "🎉 Core tests passed successfully!"
          else
            echo "⚠️ Some tests failed. Please check the job results above."
          fi
