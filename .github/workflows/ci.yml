name: CI/CD Pipeline

on:
  push:
    branches:
      - application
      - main
      - develop
  pull_request:
    branches:
      - application
      - main

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check TypeScript types
        run: npx nuxi typecheck
        continue-on-error: true
        
      - name: Lint with ESLint
        run: npx eslint . --ext .vue,.js,.ts,.jsx,.tsx --max-warnings 0
        continue-on-error: true
        
      - name: Check code formatting
        run: npx prettier --check .
        continue-on-error: true

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Test build output
        run: |
          # Check if build output exists
          if [ ! -d ".output" ]; then
            echo "❌ Build output directory not found"
            exit 1
          fi
          
          # Check if key files exist
          if [ ! -f ".output/server/index.mjs" ]; then
            echo "❌ Server build file not found"
            exit 1
          fi
          
          echo "✅ Build test passed for Node.js ${{ matrix.node-version }}"

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        run: npm audit --audit-level moderate
        continue-on-error: true
        
      - name: Check for known vulnerabilities
        run: npx audit-ci --moderate
        continue-on-error: true

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Check for outdated dependencies
        run: npm outdated
        continue-on-error: true
        
      - name: Validate package.json
        run: npm run build --dry-run
        continue-on-error: true

  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Install Playwright
        run: npx playwright install --with-deps
        
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  accessibility-test:
    name: Accessibility Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Install Playwright
        run: npx playwright install --with-deps
        
      - name: Run accessibility tests
        run: |
          # Start preview server
          npm run preview &
          PREVIEW_PID=$!
          
          # Wait for server to start
          sleep 10
          
          # Run accessibility checks
          npx playwright test tests/basic.spec.js --grep "accessibility"
          
          # Kill preview server
          kill $PREVIEW_PID
        continue-on-error: true

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Analyze bundle size
        run: |
          # Check build output size
          if [ -d ".output" ]; then
            echo "📊 Build output size:"
            du -sh .output/
            
            # Check for large files
            find .output/ -type f -size +1M -exec ls -lh {} \;
          fi
          
          echo "✅ Performance analysis completed"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Test preview server
        run: |
          # Start preview server in background
          npm run preview &
          PREVIEW_PID=$!
          
          # Wait for server to start
          sleep 10
          
          # Test if server is responding
          if curl -f http://localhost:3000 > /dev/null 2>&1; then
            echo "✅ Preview server is responding"
          else
            echo "❌ Preview server is not responding"
            exit 1
          fi
          
          # Kill preview server
          kill $PREVIEW_PID
          
          echo "✅ Integration test passed"

  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint-and-check, build-test, security-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build for preview
        run: npm run build
        
      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            
            const failedChecks = checks.check_runs.filter(check => check.conclusion === 'failure');
            const passedChecks = checks.check_runs.filter(check => check.conclusion === 'success');
            
            let body = '## 🚀 CI/CD Pipeline Results\n\n';
            body += `**Status:** ${failedChecks.length > 0 ? '❌ Some checks failed' : '✅ All checks passed'}\n\n`;
            body += `**Passed:** ${passedChecks.length} | **Failed:** ${failedChecks.length}\n\n`;
            
            if (passedChecks.length > 0) {
              body += '### ✅ Passed Checks:\n';
              passedChecks.forEach(check => {
                body += `- ${check.name}\n`;
              });
              body += '\n';
            }
            
            if (failedChecks.length > 0) {
              body += '### ❌ Failed Checks:\n';
              failedChecks.forEach(check => {
                body += `- ${check.name}\n`;
              });
              body += '\n';
            }
            
            body += '---\n';
            body += 'Preview build completed successfully! Ready for review.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint-and-check, build-test, security-check, dependency-check, e2e-test, accessibility-test, performance-test, integration-test]
    if: always()
    steps:
      - name: Generate test summary
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
            
            const allChecks = checks.check_runs;
            const passedChecks = allChecks.filter(check => check.conclusion === 'success');
            const failedChecks = allChecks.filter(check => check.conclusion === 'failure');
            const skippedChecks = allChecks.filter(check => check.conclusion === 'skipped');
            
            console.log(`📊 Test Summary for ${context.sha.substring(0, 7)}:`);
            console.log(`✅ Passed: ${passedChecks.length}`);
            console.log(`❌ Failed: ${failedChecks.length}`);
            console.log(`⏭️ Skipped: ${skippedChecks.length}`);
            console.log(`📈 Success Rate: ${((passedChecks.length / allChecks.length) * 100).toFixed(1)}%`);
            
            if (failedChecks.length > 0) {
              console.log('\n❌ Failed Checks:');
              failedChecks.forEach(check => {
                console.log(`- ${check.name}: ${check.output?.summary || 'No details available'}`);
              });
            }
