name: Weekly GSC → Notion Sync

on:
  schedule:
    # Every Monday at 07:00 UTC (09:00 Athens time)
    - cron: "0 7 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

concurrency:
  group: weekly-gsc-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Sync GSC data to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: test
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_GSC_REPORTS_DB_ID: ${{ secrets.NOTION_GSC_REPORTS_DB_ID }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run GSC → Notion sync
        id: sync
        run: ./node_modules/.bin/tsx scripts/weekly-gsc-sync.ts

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "📊 Weekly GSC report synced to Notion",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "📊 Weekly GSC Report Ready", "emoji": true }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "This week'\''s Google Search Console data has been synced to Notion.\n<https://www.notion.so/${{ secrets.NOTION_GSC_REPORTS_DB_ID }}|View in Notion>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    { "type": "mrkdwn", "text": "Run by GitHub Actions · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>" }
                  ]
                }
              ]
            }'

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "❌ Weekly GSC sync failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "❌ Weekly GSC Sync Failed", "emoji": true }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The weekly Google Search Console sync to Notion failed.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }'
