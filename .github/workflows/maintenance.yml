name: Maintenance

on:
  schedule:
    # Run maintenance tasks weekly on Sundays
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      task:
        description: 'Maintenance task to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dependencies
          - cleanup
          - audit

env:
  NODE_VERSION: '20'

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'dependencies') || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for outdated packages
        run: |
          echo "📦 Checking for outdated packages..."
          npm outdated || echo "No outdated packages found"
          
      - name: Update dependencies
        run: |
          echo "🔄 Updating dependencies..."
          # Update patch and minor versions
          npx npm-check-updates --target minor
          
      - name: Install updated dependencies
        run: npm install
        
      - name: Run tests
        run: npm run test
        
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '🤖 Automated dependency updates'
          body: |
            ## Automated Dependency Updates
            
            This PR contains automated dependency updates.
            
            ### Changes:
            - Updated npm packages to latest compatible versions
            - All tests passing ✅
            
            ### To apply:
            1. Review the changes
            2. Merge this PR
            3. Deploy to staging for testing
            
            ---
            *This PR was automatically generated by GitHub Actions*
          branch: chore/dependency-updates
          delete-branch: true

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'cleanup') || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Clean build artifacts
        run: |
          echo "🧹 Cleaning build artifacts..."
          rm -rf .nuxt .output dist coverage
          
      - name: Clean npm cache
        run: npm cache clean --force
        
      - name: Check disk usage
        run: |
          echo "💾 Disk usage before cleanup:"
          df -h
          
          echo "📁 Directory sizes:"
          du -sh ./* | sort -hr | head -10
          
      - name: Remove old artifacts
        run: |
          echo "🗑️ Removing old artifacts..."
          # Remove old build artifacts (keep last 5)
          find . -name "*.log" -mtime +7 -delete || true
          find . -name "*.tmp" -mtime +1 -delete || true
          
      - name: Final disk usage
        run: |
          echo "💾 Disk usage after cleanup:"
          df -h

  audit-dependencies:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'audit') || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: |
          echo "🔒 Running security audit..."
          npm audit --audit-level moderate
          
      - name: Check for license issues
        run: |
          echo "📄 Checking licenses..."
          npx license-checker --summary || true
          
      - name: Generate dependency report
        run: |
          echo "📊 Generating dependency report..."
          npm list --depth=0 > dependency-report.txt
          
      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.txt
          retention-days: 7

  maintenance-summary:
    name: Maintenance Summary
    runs-on: ubuntu-latest
    needs: [update-dependencies, cleanup, audit-dependencies]
    if: always()
    steps:
      - name: Generate maintenance summary
        run: |
          echo "🔧 Maintenance Summary"
          echo "====================="
          echo "📅 Date: $(date)"
          echo "🔗 Repository: ${{ github.repository }}"
          echo ""
          echo "📊 Job Results:"
          echo "- Update Dependencies: ${{ needs.update-dependencies.result }}"
          echo "- Cleanup: ${{ needs.cleanup.result }}"
          echo "- Audit Dependencies: ${{ needs.audit-dependencies.result }}"
          echo ""
          
          # Determine overall status
          if [ "${{ needs.cleanup.result }}" = "success" ] && \
             [ "${{ needs.audit-dependencies.result }}" = "success" ]; then
            echo "✅ Maintenance completed successfully!"
          else
            echo "⚠️ Some maintenance tasks had issues. Please review the results above."
          fi 