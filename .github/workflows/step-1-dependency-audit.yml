name: Step 1 - Dependency Audit

on:
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run dependency audit
      run: |
        echo "🔍 Step 1: Running dependency audit..."
        npm audit --audit-level=moderate || echo "Audit completed with warnings"
        
    - name: Check for outdated packages
      run: |
        echo "📦 Checking for outdated packages..."
        npm outdated || echo "All packages are up to date"
        
    - name: Step 1 Complete
      run: |
        echo "✅ Step 1: Dependency Audit completed successfully!"
        echo "📊 Results saved to workflow logs" 