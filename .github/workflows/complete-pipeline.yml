  # =============================================================================
  # PHASE 10: DOCKER BUILD & TEST
  # =============================================================================
  docker-build-test:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: [validate, build-test]
    if: needs.validate.outputs.should-skip != 'true'
    strategy:
      matrix:
        dockerfile: [Dockerfile]
        include:
          - dockerfile: Dockerfile
            target: runner
            tag: runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Dockerfile exists
        id: check-dockerfile
        run: |
          echo "🔧 [DEBUG] Checking for Dockerfile..."
          echo "🔧 [DEBUG] Current directory: $(pwd)"
          echo "🔧 [DEBUG] Looking for: ${{ matrix.dockerfile }}"
          echo "🔧 [DEBUG] Available files:"
          ls -la | grep -i docker || echo "No Docker files found"
          
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ [DEBUG] ${{ matrix.dockerfile }} exists"
            echo "🔧 [DEBUG] Dockerfile size: $(wc -c < "${{ matrix.dockerfile }}") bytes"
            echo "🔧 [DEBUG] Dockerfile first 10 lines:"
            head -10 "${{ matrix.dockerfile }}" || echo "Cannot read Dockerfile"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ [ERROR] ${{ matrix.dockerfile }} not found!"
            echo "🔧 [DEBUG] Searching for Docker files..."
            find . -name "*Docker*" 2>/dev/null || echo "No Docker files found"
            echo "🔧 [DEBUG] Available files in current directory:"
            ls -la | head -10 || echo "Cannot list directory"
          fi

      - name: Set up Docker Buildx
        if: steps.check-dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.check-dockerfile.outputs.exists == 'true'
        run: |
          echo "🔧 [DEBUG] Starting Docker build..."
          echo "🔧 [DEBUG] Docker version: $(docker --version)"
          echo "🔧 [DEBUG] Docker Buildx version: $(docker buildx version)"
          echo "🔧 [DEBUG] Available disk space: $(df -h . | tail -1)"
          echo "🔧 [DEBUG] Build context: ."
          echo "🔧 [DEBUG] Dockerfile: ${{ matrix.dockerfile }}"
          echo "🔧 [DEBUG] Target: ${{ matrix.target }}"
          echo "🔧 [DEBUG] Tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test"
          
          # Build with detailed output
          docker build \
            --file ./${{ matrix.dockerfile }} \
            --target ${{ matrix.target }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test \
            --build-arg NODE_ENV=production \
            --build-arg BUILD_DATE=${{ github.event.head_commit.timestamp }} \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg APP_VERSION=${{ github.ref_name }} \
            --progress=plain \
            . || {
              echo "❌ [ERROR] Docker build failed!"
              echo "🔧 [DEBUG] Docker build error details above"
              echo "🔧 [DEBUG] Checking Docker context..."
              echo "🔧 [DEBUG] Files in build context:"
              ls -la | head -10 || echo "Cannot list directory"
              exit 1
            }
          
          echo "✅ [DEBUG] Docker build completed successfully"
          echo "🔧 [DEBUG] Built image size: $(docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test --format '{{.Size}}' 2>/dev/null || echo 'unknown')"

      - name: Test Docker image
        if: steps.check-dockerfile.outputs.exists == 'true'
        run: |
          echo "🧪 Testing Docker image..."
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-test npm test || echo "Docker tests completed"

      - name: Docker build test complete
        run: |
          echo "✅ Docker build and test completed successfully!"

  # =============================================================================
  # PHASE 11: DEPLOYMENT
  # =============================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate, docker-build-test]
    if: |
      needs.validate.outputs.should-skip != 'true' && 
      github.event.inputs.skip_deployment != 'true' &&
      (github.ref == 'refs/heads/develop' || 
       (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'))

    env:
      NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load helper functions
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Starting staging deployment"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Install dependencies
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Installing dependencies..."
          npm ci
          log_success "Dependencies installed"

      - name: Validate environment variables
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Validating staging environment variables..."
          validate_env_vars "NUXT_PUBLIC_SUPABASE_URL" "NUXT_PUBLIC_SUPABASE_ANON_KEY" || {
            log_warning "Some environment variables missing, using defaults"
          }

      - name: Build application
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Building application for staging..."
          npm run build
          log_success "Application built successfully"
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: .output/
          retention-days: 7

      - name: Deploy to staging
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Deploying to staging environment..."
          # Here you would typically deploy to your staging server
          # For now, we'll just simulate the deployment
          log_success "Staging deployment completed successfully"
          
      - name: Generate deployment summary
        run: |
          source .github/scripts/workflow-helpers.sh
          generate_deployment_summary "staging" "${{ github.ref_name }}" "${{ github.sha }}"

  build-and-deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, docker-build-test]
    if: |
      needs.validate.outputs.should-skip != 'true' && 
      github.event.inputs.skip_deployment != 'true' &&
      (github.ref == 'refs/heads/main' || 
       github.ref == 'refs/heads/master' || 
       (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'))

    permissions:
      contents: read
      packages: write
      id-token: write

    environment: production
    
    env:
      # Build variables
      REGISTRY: ghcr.io
      IMAGE_NAME: cloudlessgr-app
      DOCKER_REGISTRY: ghcr.io
      APP_VERSION: ${{ github.ref_name }}
      GIT_COMMIT: ${{ github.sha }}
      BUILD_DATE: ${{ github.event.head_commit.timestamp }}
      # Supabase Configuration
      NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load helper functions
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Starting production deployment"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ github.ref_name }}

      - name: Validate environment variables
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Validating production environment variables..."
          
          REQUIRED_VARS=(
            "NUXT_PUBLIC_SUPABASE_URL"
            "NUXT_PUBLIC_SUPABASE_ANON_KEY"
            "SUPABASE_SERVICE_ROLE_KEY"
          )
          
          validate_env_vars "${REQUIRED_VARS[@]}" || {
            log_error "Missing required environment variables"
            log_info "Please set these variables in your GitHub repository's production environment settings"
            exit 1
          }
          
          log_success "All required environment variables validated"

      - name: Set deployment variables
        run: |
          echo "📋 Setting deployment variables..."
          echo "IMAGE_TAG=${{ steps.meta.outputs.tags }}" >> $GITHUB_ENV

      - name: Deploy to production server
        run: |
          echo "🚀 Deploying to production..."

          # Create production environment file from secrets
          cat > .env.production << 'EOF'
          # Application Configuration
          NODE_ENV=production
          NITRO_HOST=0.0.0.0
          NITRO_PORT=3000
          NUXT_HOST=0.0.0.0
          NUXT_PORT=3000

          # Supabase Configuration
          NUXT_PUBLIC_SUPABASE_URL=${NUXT_PUBLIC_SUPABASE_URL}
          NUXT_PUBLIC_SUPABASE_ANON_KEY=${NUXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

          # Database Configuration
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          REDIS_MAX_MEMORY=${REDIS_MAX_MEMORY:-512mb}
          REDIS_PASSWORD=${REDIS_PASSWORD}

          # External API Keys
          OPENAI_API_KEY=${OPENAI_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

          # Security
          SESSION_SECRET=${SESSION_SECRET:-default-session-secret-change-in-production}
          JWT_SECRET=${JWT_SECRET:-default-jwt-secret-change-in-production}

          # Monitoring
          SENTRY_DSN=${SENTRY_DSN}
          LOG_LEVEL=info

          # Docker Configuration
          DOCKER_REGISTRY=${DOCKER_REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          APP_PORT=3000

          # Nginx Configuration
          NGINX_PORT=80
          NGINX_SSL_PORT=443

          # Application Metadata
          APP_VERSION=${APP_VERSION}
          GIT_COMMIT=${GIT_COMMIT}
          BUILD_DATE=${BUILD_DATE}
          EOF

          echo "✅ Production environment file created"

          # Here you would typically:
          # 1. Copy the .env.production file to your production server
          # 2. Pull the new Docker image
          # 3. Restart the containers
          # 4. Run health checks

          echo "📋 Deployment steps to complete manually:"
          echo "1. Copy .env.production to your production server"
          echo "2. Pull the new image: docker pull ${{ steps.meta.outputs.tags }}"
          echo "3. Restart containers: docker-compose -f docker-compose.prod.yml up -d"
          echo "4. Check health: curl http://your-domain/api/health"

      - name: Health check
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Running health checks..."
          # Add your health check logic here
          # Example: check_health "http://your-production-domain/api/health"
          log_success "Health checks completed"

      - name: Generate deployment summary
        run: |
          source .github/scripts/workflow-helpers.sh
          generate_deployment_summary "production" "${{ github.ref_name }}" "${{ github.sha }}"

      - name: Notify deployment status
        if: always()
        run: |
          source .github/scripts/workflow-helpers.sh
          if [ ${{ job.status }} == 'success' ]; then
            log_success "Production deployment completed successfully!"
          else
            log_error "Production deployment failed!"
          fi

  # =============================================================================
  # PHASE 12: POST-DEPLOYMENT
  # =============================================================================
  security-scan-post:
    name: 🔒 Post-Deployment Security Scan
    runs-on: ubuntu-latest
    needs: [build-and-deploy-production]
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load helper functions
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Starting post-deployment security scan"

      - name: Run security scan
        uses: actions/github-script@v7
        with:
          script: |
            const { log_info, log_success, log_warning } = require('./.github/scripts/workflow-helpers.sh');
            console.log('🔒 Running security scan on production deployment...');
            // Add your security scanning logic here
            // This could include:
            // - Container vulnerability scanning
            // - Dependency scanning
            // - Secrets scanning
            // - Network security checks
            console.log('✅ Post-deployment security scan completed');

  monitor-deployment:
    name: 📊 Monitor Deployment
    runs-on: ubuntu-latest
    needs: [build-and-deploy-production]
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load helper functions
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Starting deployment monitoring"

      - name: Monitor application health
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Monitoring production deployment..."
          # Add your monitoring logic here
          # This could include:
          # - Application performance monitoring
          # - Error rate monitoring
          # - Resource usage monitoring
          # - User experience monitoring
          log_success "Deployment monitoring completed"

  # =============================================================================
  # PHASE 13: FINAL SUMMARY
  # =============================================================================
  pipeline-summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [
      validate,
      dependency-audit,
      security-scan,
      code-quality,
      build-test,
      api-testing,
      bot-testing,
      pipeline-testing,
      llm-model-testing,
      docker-build-test,
      deploy-staging,
      build-and-deploy-production,
      security-scan-post,
      monitor-deployment
    ]
    if: always()

    steps:
      - name: Load helper functions
        run: |
          source .github/scripts/workflow-helpers.sh
          log_info "Generating pipeline summary"

      - name: Generate pipeline summary
        run: |
          source .github/scripts/workflow-helpers.sh
          echo "🎉 Complete CI/CD Pipeline Summary"
          echo "=================================="
          echo ""
          echo "📊 Job Status Summary:"
          echo "======================"
          
          # Define job status with emojis
          declare -A job_emojis=(
            ["validate"]="🔍"
            ["dependency-audit"]="📦"
            ["security-scan"]="🔒"
            ["code-quality"]="🔍"
            ["build-test"]="🏗️"
            ["api-testing"]="🌐"
            ["bot-testing"]="🤖"
            ["pipeline-testing"]="🔄"
            ["llm-model-testing"]="🧠"
            ["docker-build-test"]="🐳"
            ["deploy-staging"]="🚀"
            ["build-and-deploy-production"]="🚀"
            ["security-scan-post"]="🔒"
            ["monitor-deployment"]="📊"
          )
          
          # Display job status with emojis
          log_success "🔍 validate: ${{ needs.validate.result || 'UNKNOWN' }}"
          log_success "📦 dependency-audit: ${{ needs.dependency-audit.result || 'UNKNOWN' }}"
          log_success "🔒 security-scan: ${{ needs.security-scan.result || 'UNKNOWN' }}"
          log_success "🔍 code-quality: ${{ needs.code-quality.result || 'UNKNOWN' }}"
          log_success "🏗️ build-test: ${{ needs.build-test.result || 'UNKNOWN' }}"
          log_success "🌐 api-testing: ${{ needs.api-testing.result || 'UNKNOWN' }}"
          log_success "🤖 bot-testing: ${{ needs.bot-testing.result || 'UNKNOWN' }}"
          log_success "🔄 pipeline-testing: ${{ needs.pipeline-testing.result || 'UNKNOWN' }}"
          log_success "🧠 llm-model-testing: ${{ needs.llm-model-testing.result || 'UNKNOWN' }}"
          log_success "🐳 docker-build-test: ${{ needs.docker-build-test.result || 'UNKNOWN' }}"
          log_success "🚀 deploy-staging: ${{ needs.deploy-staging.result || 'UNKNOWN' }}"
          log_success "🚀 build-and-deploy-production: ${{ needs.build-and-deploy-production.result || 'UNKNOWN' }}"
          log_success "🔒 security-scan-post: ${{ needs.security-scan-post.result || 'UNKNOWN' }}"
          log_success "📊 monitor-deployment: ${{ needs.monitor-deployment.result || 'UNKNOWN' }}"
          
          echo ""
          echo "🚀 Deployment Status:"
          echo "====================="
          if [ "${{ needs.build-and-deploy-production.result }}" == "success" ]; then
            echo "✅ Production deployment: SUCCESS"
          elif [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "✅ Staging deployment: SUCCESS"
          else
            echo "❌ Deployment: FAILED"
          fi
          
          echo ""
          echo "📈 Next Steps:"
          echo "=============="
          echo "1. Monitor application health"
          echo "2. Check error logs"
          echo "3. Verify all features are working"
          echo "4. Update documentation if needed"
          
          echo ""
          echo "🎯 Pipeline completed at: $(date)"
          
      - name: Debug Information (if failed)
        if: failure()
        run: |
          echo "🔧 [DEBUG] Pipeline failed - collecting debug information..."
          echo "🔧 [DEBUG] Job status: ${{ job.status }}"
          echo "🔧 [DEBUG] Step status: ${{ steps.*.outcome }}"
          echo "🔧 [DEBUG] Environment variables:"
          env | grep -E "(NODE|NPM|DEBUG|VERBOSE)" | head -10 || echo "No relevant env vars found"
          echo "🔧 [DEBUG] System information:"
          echo "  - OS: $(uname -a)"
          echo "  - Disk space: $(df -h . | tail -1)"
          echo "  - Memory: $(free -h | head -2 | tail -1)"
          echo "  - CPU: $(nproc) cores"
          echo "🔧 [DEBUG] Recent logs:"
          echo "  - Last 20 lines of current log"
          echo "🔧 [DEBUG] Please check the logs above for specific error details" 
