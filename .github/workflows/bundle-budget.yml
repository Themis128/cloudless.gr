name: Bundle Budget Audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'next.config.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    name: Bundle Budget
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
      NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
      NEXT_PUBLIC_HUBSPOT_PORTAL_ID: ${{ secrets.NEXT_PUBLIC_HUBSPOT_PORTAL_ID }}
      # Budget history:
      #   1700KB → 1800KB (Phase 6.3): calm-cloud rebrand (theme-v2.css + alpha override list)
      #   1800KB → 1900KB (portal feature): customer portal flow added /portal/waiting,
      #     /portal/[token] timeline, admin pending-clients UI, lucide-react icons (~25KB).
      BUNDLE_MAX_KB: "1900"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node scripts/audit/check-bundle-budget.mjs
