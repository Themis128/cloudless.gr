name: Bundle Budget Audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'next.config.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    name: Bundle Budget
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: us-east-1_JQWwFbO9a
      NEXT_PUBLIC_COGNITO_CLIENT_ID: 2qq6i24oc48391cmuv4kfl1rm2
      NEXT_PUBLIC_HUBSPOT_PORTAL_ID: "147639927"
      BUNDLE_MAX_KB: "1700"
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node scripts/audit/check-bundle-budget.mjs
