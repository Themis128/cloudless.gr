name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, application, platform]
    tags: ['v*']
  pull_request:
    branches: [main, develop, application, platform]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip testing phases'
        required: false
        default: false
        type: boolean
      skip_deployment:
        description: 'Skip deployment phase'
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: 'Force rebuild all caches'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # =============================================================================
  # CI PHASE - Using reusable workflow
  # =============================================================================
  ci:
    name: 🔄 CI Pipeline
    uses: ./.github/workflows/reusable/ci-base.yml
    with:
      environment: ${{ inputs.environment || 'staging' }}
      skip_tests: ${{ inputs.skip_tests }}
      skip_deployment: ${{ inputs.skip_deployment }}
      force_rebuild: ${{ inputs.force_rebuild }}
      runner_type: self-hosted
    secrets: inherit

  # =============================================================================
  # DEPLOYMENT PHASE - Using reusable workflow
  # =============================================================================
  deploy:
    name: 🚀 Deploy to ${{ inputs.environment || 'staging' }}
    needs: ci
    if: |
      needs.ci.result == 'success' && 
      inputs.skip_deployment != 'true' && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable/deploy.yml
    with:
      environment: ${{ inputs.environment || 'staging' }}
      health_check_url: ${{ inputs.environment == 'production' && 'https://cloudless.gr/api/health' || 'https://staging.cloudless.gr/api/health' }}
    secrets: inherit

  # =============================================================================
  # INTEGRATION TESTS - Only for production deployments
  # =============================================================================
  integration-tests:
    name: 🔄 Integration Tests
    runs-on: self-hosted
    needs: [ci, deploy]
    if: |
      needs.ci.result == 'success' && 
      needs.deploy.result == 'success' && 
      inputs.environment == 'production' && 
      inputs.skip_tests != 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          
          # Wait for deployment to be ready
          sleep 30
          
          # Run integration tests
          npm run test:integration || true
          
          # Test API endpoints
          npm run test:api || true

  # =============================================================================
  # FINAL SUMMARY
  # =============================================================================
  final-summary:
    name: 📋 Final Summary
    runs-on: self-hosted
    needs: [ci, deploy, integration-tests]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Generate final summary
        run: |
          echo "## 🎉 CI/CD Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Results:" >> $GITHUB_STEP_SUMMARY
          echo "- **CI Pipeline:** ${{ needs.ci.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Integration Tests:** ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Configuration:" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skip Tests:** ${{ inputs.skip_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skip Deployment:** ${{ inputs.skip_deployment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Force Rebuild:** ${{ inputs.force_rebuild }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Determine overall success
          if [ "${{ needs.ci.result }}" == "success" ] && [ "${{ needs.deploy.result }}" == "success" ]; then
            if [ "${{ inputs.environment }}" == "production" ] && [ "${{ needs.integration-tests.result }}" != "success" ] && [ "${{ needs.integration-tests.result }}" != "skipped" ]; then
              echo "⚠️ **Pipeline completed with warnings**" >> $GITHUB_STEP_SUMMARY
              echo "Integration tests failed, but deployment was successful." >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **Pipeline completed successfully!**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Pipeline failed!**" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for details on what went wrong." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY 