name: SonarQube Cloud Analysis

on:
  # Trigger analysis on push to application branch (main)
  push:
    branches:
      - application
  # Also trigger on pull requests targeting application branch
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - application

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run tests (if available)
        run: |
          if [ -f "package.json" ] && grep -q "\"test\":" package.json; then
            npm test
          else
            echo "No tests found, skipping test execution"
          fi
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed for PR analysis
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # Ensure this secret is set in your repository settings at https://github.com/<owner>/<repo>/settings/secrets/actions
        with:
          # Additional arguments for SonarCloud scanner
          # The token is passed via env, not with
          args: >
            -Dsonar.projectKey=Themis128_cloudless.gr
            -Dsonar.organization=themis128
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.nuxt/**,**/.output/**,**/coverage/**,**/cypress/**,**/playwright/**,**/docker/**,**/scripts/**/*.ps1
            -Dsonar.typescript.tsconfigPath=tsconfig.json
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
