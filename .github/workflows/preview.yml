name: Preview Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'sst.config.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        id: awscreds
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::278585680617:role/GitHubActionsOIDC
          role-session-name: gha-preview-${{ github.run_id }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Fail with OIDC trust-policy guidance
        if: steps.awscreds.outcome == 'failure'
        run: |
          echo "OIDC assume role failed for PR preview."
          echo "If this is from a fork, GitHub will not grant OIDC tokens by default."
          echo "If this is an internal PR, allow sub claim repo:Themis128/cloudless.gr:pull_request in the IAM trust policy."
          exit 1

      - name: Deploy staging
        id: deploy
        run: |
          pnpm deploy:staging 2>&1 | tee deploy-output.txt
          # Extract the site URL from SST output
          URL=$(grep -oP 'https://\S+' deploy-output.txt | head -1 || echo "")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        if: steps.deploy.outputs.url != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-url
          message: |
            ### 🚀 Preview deployed!
            **URL:** ${{ steps.deploy.outputs.url }}
            **Commit:** ${{ github.sha }}
