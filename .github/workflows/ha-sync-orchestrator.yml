name: HA sync orchestrator

# Ensures Pi standby image builds stay in lockstep with successful
# production deploy SHAs. If a deploy completes for a SHA that does not
# already have a successful "build pi image" run, this workflow dispatches
# one for that exact SHA and waits for completion.

on:
  workflow_run:
    workflows: ["Deploy to Production"]
    types: [completed]

permissions:
  actions: write
  contents: read

concurrency:
  group: ha-sync-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  ensure-pi-build:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: resolve deploy metadata
        id: meta
        run: |
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          echo "url=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_OUTPUT"

      - name: inspect existing pi build runs for deploy SHA
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploySha = '${{ steps.meta.outputs.sha }}';
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'build-pi-image.yml',
              per_page: 100,
            });

            const candidates = runs
              .filter((run) => run.head_sha === deploySha)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const success = candidates.find((run) => run.conclusion === 'success');
            const active = candidates.find((run) => run.status !== 'completed');

            core.info(`Deploy SHA: ${deploySha}`);
            core.info(`Matching runs: ${candidates.length}`);
            if (success) core.info(`Existing successful build: ${success.html_url}`);
            if (active) core.info(`Existing active build: ${active.html_url}`);

            core.setOutput('exists', success ? 'true' : 'false');
            core.setOutput('active', active ? 'true' : 'false');

      - name: dispatch pi image build for deploy SHA
        if: steps.check.outputs.exists != 'true' && steps.check.outputs.active != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploySha = '${{ steps.meta.outputs.sha }}';
            const deployBranch = '${{ steps.meta.outputs.branch }}';
            const { owner, repo } = context.repo;

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'build-pi-image.yml',
              ref: deployBranch,
              inputs: {
                target_sha: deploySha,
              },
            });

            core.info(`Dispatched build-pi-image.yml for ${deploySha} via ref=${deployBranch}`);

      - name: wait for pi build completion
        if: steps.check.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploySha = '${{ steps.meta.outputs.sha }}';
            const { owner, repo } = context.repo;

            const maxAttempts = 60; // 15m at 15s intervals
            const delayMs = 15000;

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'build-pi-image.yml',
                per_page: 50,
              });

              const candidates = response.data.workflow_runs
                .filter((run) => run.head_sha === deploySha)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              const success = candidates.find((run) => run.conclusion === 'success');
              if (success) {
                core.info(`Pi build completed successfully: ${success.html_url}`);
                return;
              }

              const active = candidates.find((run) => run.status !== 'completed');
              if (active) {
                core.info(`Attempt ${attempt}: waiting on active run ${active.id} ${active.html_url}`);
                await sleep(delayMs);
                continue;
              }

              if (candidates.length > 0) {
                const latest = candidates[0];
                core.setFailed(`Pi build has no successful run for SHA ${deploySha}. Latest conclusion=${latest.conclusion}. Run: ${latest.html_url}`);
                return;
              }

              core.info(`Attempt ${attempt}: no run found yet for SHA ${deploySha}`);
              await sleep(delayMs);
            }

            core.setFailed(`Timed out waiting for successful pi build run for SHA ${deploySha}`);

      - name: summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "Pi build already existed for deploy SHA ${{ steps.meta.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.check.outputs.active }}" = "true" ]; then
            echo "Pi build was already running for deploy SHA ${{ steps.meta.outputs.sha }}; orchestrator waited for completion" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Pi build was missing and has now been orchestrated for deploy SHA ${{ steps.meta.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Deploy run: ${{ steps.meta.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
