name: Monthly Security Audit

on:
  schedule:
    # Run on the 1st of each month at 9:00 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set audit date
        run: echo "AUDIT_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Run security audit
        run: pnpm audit --json > audit-report.json
        continue-on-error: true

      - name: Parse and summarise audit results
        run: |
          echo "## 🔒 Monthly Security Audit — $AUDIT_DATE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-report.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate' audit-report.json)
          LOW=$(jq '.metadata.vulnerabilities.low' audit-report.json)
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Critical | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟠 High     | $HIGH     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 Moderate | $MODERATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚪ Low      | $LOW      |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ env.AUDIT_DATE }}
          path: audit-report.json
          retention-days: 90

      - name: Fail if critical or high vulnerabilities found
        run: |
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-report.json)
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Unacceptable vulnerabilities found — Critical: $CRITICAL, High: $HIGH"
            echo "Run 'pnpm audit --fix' locally and open a PR to resolve these before the next release."
            exit 1
          fi
          echo "✅ No critical or high vulnerabilities found."
