name: Google Calendar → Notion Sync

on:
  schedule:
    # Every day at 07:00 UTC (09:00 Athens time)
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: calendar-notion-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Sync Google Calendar consultations to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: production
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_CALENDAR_DB_ID: ${{ secrets.NOTION_CALENDAR_DB_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Google Calendar → Notion sync
        run: pnpm exec tsx --tsconfig scripts/tsconfig.json scripts/calendar-notion-sync.ts

      - name: Summary
        if: always()
        run: |
          echo "### 📅 Google Calendar → Notion Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run at | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"
