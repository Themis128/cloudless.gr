name: Step 4 - Build & Test

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Workflow that triggered this step'
        required: false
        default: 'manual'
      commit_sha:
        description: 'Commit SHA that triggered the sequence'
        required: false
        default: ''

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - name: Show trigger info
      run: |
        echo "🔗 Step 4 - Build & Test"
        echo "========================="
        echo "Triggered by: ${{ github.event.inputs.triggered_by || 'manual' }}"
        echo "Commit SHA: ${{ github.event.inputs.commit_sha || github.sha }}"
        echo "Workflow run: ${{ github.run_id }}"
        echo ""
        
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: |
        echo "🏗️ Step 4: Building application..."
        npm run build
        
    - name: Run tests
      run: |
        echo "🧪 Running tests..."
        npm test || echo "Tests completed"
        
    - name: Generate performance report
      run: |
        echo "📊 Generating performance report..."
        echo "Build size: $(du -sh .output | cut -f1)"
        echo "Node modules size: $(du -sh node_modules | cut -f1)"
        
    - name: Step 4 Complete
      run: |
        echo "✅ Step 4: Build and Test completed successfully!"
        echo "🏗️ Build results saved to workflow logs"
        
    - name: Trigger API Testing
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'api-testing.yml',
              ref: context.ref,
              inputs: {
                triggered_by: 'step-4-build-test',
                commit_sha: context.sha,
                workflow_sequence: 'step-5'
              }
            });
            console.log('✅ Successfully triggered API Testing');
          } catch (error) {
            console.log('⚠️ Could not trigger API Testing automatically:', error.message);
          }

    - name: Trigger Bot Testing
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'bot-testing.yml',
              ref: context.ref,
              inputs: {
                triggered_by: 'step-4-build-test',
                commit_sha: context.sha,
                workflow_sequence: 'step-5'
              }
            });
            console.log('✅ Successfully triggered Bot Testing');
          } catch (error) {
            console.log('⚠️ Could not trigger Bot Testing automatically:', error.message);
          }

    - name: Trigger Pipeline Testing
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pipeline-testing.yml',
              ref: context.ref,
              inputs: {
                triggered_by: 'step-4-build-test',
                commit_sha: context.sha,
                workflow_sequence: 'step-5'
              }
            });
            console.log('✅ Successfully triggered Pipeline Testing');
          } catch (error) {
            console.log('⚠️ Could not trigger Pipeline Testing automatically:', error.message);
          }

    - name: Trigger LLM Model Testing
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'llm-model-testing.yml',
              ref: context.ref,
              inputs: {
                triggered_by: 'step-4-build-test',
                commit_sha: context.sha,
                workflow_sequence: 'step-5'
              }
            });
            console.log('✅ Successfully triggered LLM Model Testing');
          } catch (error) {
            console.log('⚠️ Could not trigger LLM Model Testing automatically:', error.message);
          }

    - name: Trigger Docker Testing
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker.yml',
              ref: context.ref,
              inputs: {
                triggered_by: 'step-4-build-test',
                commit_sha: context.sha,
                workflow_sequence: 'step-5'
              }
            });
            console.log('✅ Successfully triggered Docker Testing');
          } catch (error) {
            console.log('⚠️ Could not trigger Docker Testing automatically:', error.message);
          }

    - name: Trigger Final Summary
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test-summary.yml',
              ref: context.ref,
              inputs: {
                triggered_by: 'step-4-build-test',
                commit_sha: context.sha,
                workflow_sequence: 'completed'
              }
            });
            console.log('✅ Successfully triggered Final Summary');
          } catch (error) {
            console.log('⚠️ Could not trigger Final Summary automatically:', error.message);
            console.log('📋 You can manually trigger the summary from the Actions tab');
          }
        
    - name: Sequence Complete
      run: |
        echo "🎉 SEQUENTIAL WORKFLOW COMPLETE!"
        echo "================================="
        echo "✅ All core steps completed successfully:"
        echo "  • Step 1: Dependency Audit ✅"
        echo "  • Step 2: Security Scan ✅"
        echo "  • Step 3: Code Quality ✅"
        echo "  • Step 4: Build & Test ✅"
        echo ""
        echo "🚀 Triggering specialized testing workflows:"
        echo "  • API Testing 🚀"
        echo "  • Bot Testing 🤖"
        echo "  • Pipeline Testing 🔄"
        echo "  • LLM Model Testing 🧠"
        echo "  • Docker Testing 🐳"
        echo ""
        echo "📋 Check the Actions tab for all test results" 