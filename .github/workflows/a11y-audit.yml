name: Accessibility Audit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'public/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  axe-playwright:
    name: Playwright A11y Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: us-east-1_JQWwFbO9a
      NEXT_PUBLIC_COGNITO_CLIENT_ID: 2qq6i24oc48391cmuv4kfl1rm2
      NEXT_PUBLIC_HUBSPOT_PORTAL_ID: "147639927"
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test e2e/accessibility.spec.ts
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
