name: k3s standby E2E

# Runs the Playwright suite against the live Pi standby (cloudless.online,
# always served via APIGW → Lambda → Funnel → Pi). Acts as a post-deploy
# smoke gate — catches regressions in the failover serving path that
# wouldn't show up in localhost tests.
#
# Triggers:
#   - workflow_run after "Deploy to Production" completes (passes or fails)
#   - workflow_run after "build pi image" completes (image rolled to standby)
#   - daily cron (catches drift introduced by SSM / Notion / Pi-side changes
#     that didn't go through cloudless.gr CI)
#   - manual dispatch with optional baseURL override
#
# Failures don't block deploys (the deploy already finished by the time
# this fires), but they do open a GitHub issue via the existing
# create-issue-on-fail action workflow if configured. For now we just rely
# on the failure email + the visible red ✗ on the run page.

on:
  # Only fire after the HA sync orchestrator has confirmed (or just
  # finished dispatching) a Pi build for the deploy SHA. Triggering on
  # "Deploy to Production" or raw "build pi image" races the Pi-side
  # rollout — Pi serves HTML referencing chunks from the new SHA before
  # those chunks have actually rolled out, producing 500/502 ChunkLoadError
  # and a confusing red E2E.
  workflow_run:
    workflows: ["HA sync orchestrator"]
    types: [completed]
  schedule:
    # 04:00 UTC daily (07:00 Athens) — well before any business activity
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override target (e.g. https://cloudless.gr)"
        required: false
        default: "https://cloudless.online"

permissions:
  contents: read

concurrency:
  group: k3s-e2e
  cancel-in-progress: true

jobs:
  e2e:
    name: playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install deps
        run: pnpm install --frozen-lockfile

      - name: install playwright chromium (cached)
        run: pnpm exec playwright install --with-deps chromium

      - name: wait for Pi standby to converge on a self-consistent bundle
        # /api/health is served by Lambda, not by the Pi-side Next.js bundle, so
        # 200 there does NOT prove the Pi has finished rolling out the new SHA.
        # We need the Pi's homepage HTML to reference a chunk that itself
        # returns 200 — i.e. the Pi is serving HTML+chunks from the same
        # build. Up to 3min of polling covers the K3s rolling update window.
        run: |
          set -euo pipefail
          BASE="${BASE_URL:-https://cloudless.online}"
          deadline=$(( $(date +%s) + 180 ))
          attempt=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            attempt=$((attempt + 1))
            html=$(curl -fsS --max-time 15 "${BASE}/en" 2>/dev/null || echo "")
            if [ -z "$html" ]; then
              echo "  [$attempt] homepage not serving yet"
              sleep 10; continue
            fi
            chunk=$(echo "$html" | grep -oE '/_next/static/chunks/[^"]+\.js' | head -n 1 || true)
            if [ -z "$chunk" ]; then
              echo "  [$attempt] no chunk reference found in HTML"
              sleep 10; continue
            fi
            code=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "${BASE}${chunk}")
            if [ "$code" = "200" ]; then
              echo "  ✓ Pi is self-consistent (HTML and chunk ${chunk##*/chunks/} both 200) after ${attempt} attempt(s)"
              exit 0
            fi
            echo "  [$attempt] chunk ${chunk##*/chunks/} returned ${code}; Pi still rolling out"
            sleep 10
          done
          echo "::warning::Pi did not converge within 3min — running tests anyway; failures may reflect mid-rollout state"
        env:
          BASE_URL: ${{ inputs.base_url }}

      - name: run k3s suite
        env:
          CI: "1"
          K3S_BASE_URL: ${{ inputs.base_url || 'https://cloudless.online' }}
        run: pnpm exec playwright test --config=playwright.k3s.config.mts

      - name: upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-k3s
          path: |
            playwright-report/
            test-results/
          retention-days: 14
