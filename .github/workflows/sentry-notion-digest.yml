name: Sentry → Notion Error Digest

on:
  schedule:
    # Every Monday at 08:00 UTC (10:00 Athens time) — after the GSC sync
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: sentry-notion-digest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  digest:
    name: Write Sentry error digest to Notion
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: production
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_REPORTS_DB_ID: ${{ secrets.NOTION_REPORTS_DB_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Sentry → Notion error digest
        run: pnpm exec tsx --tsconfig scripts/tsconfig.json scripts/sentry-notion-digest.ts

      - name: Summary
        if: always()
        run: |
          echo "### 🐛 Sentry → Notion Error Digest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run at | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"
