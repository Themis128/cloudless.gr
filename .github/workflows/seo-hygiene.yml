name: SEO Hygiene Audit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'src/locales/**'
      - 'scripts/audit/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seo:
    name: Link Text and SEO Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check descriptive link text
        run: node scripts/audit/check-generic-link-text.mjs
      - name: Validate robots and sitemap presence
        run: |
          test -f src/app/robots.ts
          test -f src/app/sitemap.ts
          echo "robots.ts and sitemap.ts found"
