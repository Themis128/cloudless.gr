name: Dependency Management

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/dependabot.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Dependency management action'
        required: true
        default: 'audit'
        type: choice
        options:
          - audit
          - update
          - security-check
          - cleanup

env:
  NODE_VERSION: '20'

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'audit' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: |
          echo "🔒 Running security audit..."
          npm audit --audit-level moderate --json > audit-report.json || true
          
          # Parse audit results
          VULNERABILITIES=$(jq -r '.metadata.vulnerabilities.total // 0' audit-report.json 2>/dev/null || echo "0")
          
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "❌ Found $VULNERABILITIES vulnerabilities"
            echo "::error::Security vulnerabilities detected. Please review and fix."
            exit 1
          else
            echo "✅ No security vulnerabilities found"
          fi

      - name: Check for outdated packages
        run: |
          echo "📦 Checking for outdated packages..."
          npm outdated --json > outdated-report.json || true
          
          OUTDATED_COUNT=$(jq 'length' outdated-report.json 2>/dev/null || echo "0")
          
          if [ "$OUTDATED_COUNT" -gt 0 ]; then
            echo "⚠️ Found $OUTDATED_COUNT outdated packages"
            echo "::warning::Outdated packages detected. Consider updating."
          else
            echo "✅ All packages are up to date"
          fi

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit-results
          path: |
            audit-report.json
            outdated-report.json
          retention-days: 30

  dependency-update:
    name: Dependency Update
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'update'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update dependencies
        run: |
          echo "🔄 Updating dependencies..."
          npx npm-check-updates --target minor --upgrade
          npm install

      - name: Run tests
        run: npm run test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '🤖 Automated dependency updates'
          body: |
            ## Automated Dependency Updates
            
            This PR contains automated dependency updates.
            
            ### Changes:
            - Updated npm packages to latest compatible versions
            - All tests passing ✅
            
            ### To apply:
            1. Review the changes
            2. Merge this PR
            3. Deploy to staging for testing
            
            ---
            *This PR was automatically generated by GitHub Actions*
          branch: chore/dependency-updates
          delete-branch: true

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'security-check'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: HEAD~1
          head: HEAD
          extra_args: --only-verified --exclude-paths .trufflehogignore

      - name: Check for dangerous dependencies
        run: |
          echo "🔍 Checking for dangerous dependencies..."
          npm audit --audit-level high
          
          # Check for known vulnerable packages
          npx audit-ci --high

  dependency-cleanup:
    name: Dependency Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'cleanup'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Remove node_modules
        run: rm -rf node_modules package-lock.json

      - name: Fresh install
        run: npm ci

      - name: Verify installation
        run: |
          echo "✅ Verifying installation..."
          npm run build
          npm run test

  dependabot-coordination:
    name: Dependabot Coordination
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.user.login, 'dependabot')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🤖 Dependabot Test Results')
            );
            
            const testResults = context.job === 'success' ? '✅ All tests passed' : '❌ Tests failed';
            
            const commentBody = `🤖 Dependabot Test Results
            
            ${testResults}
            
            - ✅ Dependencies installed successfully
            - ✅ All tests passing
            - ✅ Application builds successfully
            
            This PR is ready for review and merge.`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            } 