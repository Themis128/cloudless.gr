name: Deploy to Production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '__tests__/**'
      - 'public/**'
      - 'sst.config.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://cloudless.gr

    env:
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
      NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
      NEXT_PUBLIC_HUBSPOT_PORTAL_ID: ${{ secrets.NEXT_PUBLIC_HUBSPOT_PORTAL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:ci

      - name: Bump service worker CACHE_VERSION
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          VERSION=$(printf '%d' "0x${SHORT_SHA:0:4}")
          sed -i "s/const CACHE_VERSION = \"[^\"]*\"/const CACHE_VERSION = \"${VERSION}\"/" public/sw.js
          echo "CACHE_VERSION bumped to ${VERSION} (sha: ${SHORT_SHA})"
          grep "CACHE_VERSION" public/sw.js

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Preflight — verify IAM role-tagging permissions
        run: |
          set -euo pipefail

          # 1. Confirm the role was assumed successfully
          CALLER=$(aws sts get-caller-identity --output json)
          CALLER_ARN=$(echo "$CALLER" | jq -r '.Arn')
          echo "Assumed identity: $CALLER_ARN"

          # 2. simulate-principal-policy requires an IAM principal ARN (NOT an STS assumed-role ARN).
          #    Convert arn:aws:sts::<acct>:assumed-role/<RoleName>/session → arn:aws:iam::<acct>:role/<RoleName>
          ACCOUNT_ID=$(echo "$CALLER" | jq -r '.Account')
          if [[ "$CALLER_ARN" =~ ^arn:aws:sts::[0-9]+:assumed-role/([^/]+)/ ]]; then
            ROLE_NAME="${BASH_REMATCH[1]}"
            ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
            echo "Simulating policy for role: $ROLE_ARN"
          else
            ROLE_ARN="$CALLER_ARN"
            echo "Simulating policy for principal: $ROLE_ARN"
          fi

          REQUIRED_ACTIONS="iam:SimulatePrincipalPolicy iam:GetRole iam:TagRole iam:UntagRole iam:ListRoleTags"

          set +e
          # Simulate against the prefix SST actually manages (cloudl-production-*).
          # Testing against arn:aws:iam::*:role/* would require admin perms we
          # do not need or want to grant.
          SIMULATION=$(aws iam simulate-principal-policy \
            --policy-source-arn "$ROLE_ARN" \
            --action-names $REQUIRED_ACTIONS \
            --resource-arns "arn:aws:iam::${ACCOUNT_ID}:role/cloudl-production-example" \
            --output json 2> /tmp/simulate-principal-policy.err)
          SIMULATION_EXIT_CODE=$?
          set -e
          if [ "$SIMULATION_EXIT_CODE" -ne 0 ]; then
            # The preflight is a helper, not a gate. If the role itself lacks
            # iam:SimulatePrincipalPolicy we cannot probe — warn and continue,
            # letting the actual deploy surface any missing tag perms.
            if grep -qE "AccessDenied|not authorized to perform: iam:SimulatePrincipalPolicy" /tmp/simulate-principal-policy.err; then
              echo "::warning::Skipping IAM preflight: deploy role lacks iam:SimulatePrincipalPolicy."
              echo "::warning::To re-enable preflight checks, grant iam:SimulatePrincipalPolicy on resource: ${ROLE_ARN}"
              cat /tmp/simulate-principal-policy.err >&2
            else
              echo "::error::Could not run iam:SimulatePrincipalPolicy for $ROLE_ARN"
              cat /tmp/simulate-principal-policy.err >&2
              echo "::error::Fix the IAM policy attached to the deploy role: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}"
              exit 1
            fi
          else

            # 3. Check each action's evaluation decision
            DENIED=$(echo "$SIMULATION" | jq -r '
              .EvaluationResults[]
              | select(.EvalDecision != "allowed")
              | .EvalActionName
            ')

            if [ -n "$DENIED" ]; then
              echo "::error::The following IAM actions are NOT allowed for $ROLE_ARN:"
              echo "$DENIED" | while read -r action; do echo "  - $action"; done
              echo ""
              echo "::error::Fix the IAM policy attached to the deploy role: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}"
              echo "::error::At minimum allow: iam:GetRole, iam:TagRole, iam:UntagRole, iam:ListRoleTags on the role(s) SST manages (cloudl-production-*)"
              echo "::error::Also allow: iam:SimulatePrincipalPolicy (so this preflight can run)"
              echo "::error::See docs/deploy.md for the exact policy statements."
              exit 1
            fi

            echo "✅ IAM permissions confirmed for $ROLE_ARN"
          fi

      - name: Notify Slack — deploy started
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rocket: Deploy started — \`${GITHUB_SHA::7}\` by ${{ github.actor }}\",
              \"blocks\": [
                {\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \":rocket: Deploy Started\", \"emoji\": true}},
                {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Stage:* \`production\`\n*Commit:* \`${GITHUB_SHA::7}\`\n*Actor:* ${{ github.actor }}\"}},
                {\"type\": \"context\", \"elements\": [{\"type\": \"mrkdwn\", \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>\"}]} 
              ]
            }"

      - name: Deploy (SST)
        run: pnpm sst deploy --stage production
        env:
          AWS_REGION: us-east-1
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: baltzakisthemiscom
          SENTRY_PROJECT: cloudless-gr
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Publish current SHA to SSM (for Pi-side image pin)
        # Writes the just-deployed commit SHA to a well-known SSM parameter.
        # The Pi K3s standby reads this to know which cloudless-pi-app:<sha>
        # tag to pull, so Pi and cloud are deterministically pinned to the
        # same code. Failure here doesn't block deploy — the cloud is already
        # live; Pi just won't know about this revision until the next deploy.
        # Requires ssm:PutParameter on /cloudless/production/* (covered by
        # PowerUserAccess on the deploy role).
        if: success()
        continue-on-error: true
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name '/cloudless/production/current-image-sha' \
            --type String \
            --value "${GITHUB_SHA}" \
            --overwrite \
            --description 'Latest production deploy SHA — Pi K3s reads this to pin its image tag.' \
            --region us-east-1 > /dev/null
          echo "→ Published SHA ${GITHUB_SHA::12} to SSM /cloudless/production/current-image-sha"

      - name: Notify Slack — deploy succeeded
        if: success() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":white_check_mark: Deploy succeeded — \`${GITHUB_SHA::7}\` is live\",
              \"blocks\": [
                {\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \":white_check_mark: Deploy Succeeded\", \"emoji\": true}},
                {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Stage:* \`production\`\n*Commit:* \`${GITHUB_SHA::7}\`\n*Actor:* ${{ github.actor }}\n*URL:* <https://cloudless.gr|cloudless.gr>\"}},
                {\"type\": \"context\", \"elements\": [{\"type\": \"mrkdwn\", \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>\"}]} 
              ]
            }"

      - name: Notify Slack — deploy failed
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":x: Deploy failed — \`${GITHUB_SHA::7}\` by ${{ github.actor }}\",
              \"blocks\": [
                {\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \":x: Deploy Failed\", \"emoji\": true}},
                {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Stage:* \`production\`\n*Commit:* \`${GITHUB_SHA::7}\`\n*Actor:* ${{ github.actor }}\"}},
                {\"type\": \"context\", \"elements\": [{\"type\": \"mrkdwn\", \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>\"}]} 
              ]
            }"
