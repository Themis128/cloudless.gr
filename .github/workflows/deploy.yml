name: Deploy

on:
  push:
    branches:
      - main
      - production
      - application
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: .output/
          retention-days: 7

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "git_branch=$GIT_BRANCH" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Build versioned Docker image
        run: |
          echo "­¤É│ Building versioned Docker image..."
          VERSION="${{ steps.version.outputs.version }}"
          GIT_COMMIT="${{ steps.version.outputs.git_commit }}"
          GIT_BRANCH="${{ steps.version.outputs.git_branch }}"
          BUILD_DATE="${{ steps.version.outputs.build_date }}"
          docker build \
            --build-arg VERSION="$VERSION" \
            --build-arg GIT_COMMIT="$GIT_COMMIT" \
            --build-arg GIT_BRANCH="$GIT_BRANCH" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --build-arg NODE_ENV=production \
            -t cloudlessgr-app:latest \
            -t cloudlessgr-app:v$VERSION \
            -t cloudlessgr-app:v$VERSION-$GIT_COMMIT \
            -t cloudlessgr-app:$GIT_BRANCH \
            -t cloudlessgr-app:$GIT_BRANCH-$GIT_COMMIT \
            .

      - name: Deploy to staging
        run: |
          echo "Ō£ģ Staging deployment completed (no registry push)"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    env:
      # These secrets must be set in the GitHub 'production' environment
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Validate build output
        run: |
          echo "­¤öŹ Validating build output..."
          if [ ! -f ".output/server/index.mjs" ]; then
            echo "ŌØī Server file not found"
            exit 1
          fi
          echo "Ō£ģ Server file found"
          ls -la .output/server/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: .output/
          retention-days: 30

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "git_branch=$GIT_BRANCH" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Build versioned Docker image
        run: |
          echo "­¤É│ Building versioned Docker image..."
          VERSION="${{ steps.version.outputs.version }}"
          GIT_COMMIT="${{ steps.version.outputs.git_commit }}"
          GIT_BRANCH="${{ steps.version.outputs.git_branch }}"
          BUILD_DATE="${{ steps.version.outputs.build_date }}"
          docker build \
            --build-arg VERSION="$VERSION" \
            --build-arg GIT_COMMIT="$GIT_COMMIT" \
            --build-arg GIT_BRANCH="$GIT_BRANCH" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --build-arg NODE_ENV=production \
            -t cloudlessgr-app:latest \
            -t cloudlessgr-app:v$VERSION \
            -t cloudlessgr-app:v$VERSION-$GIT_COMMIT \
            -t cloudlessgr-app:$GIT_BRANCH \
            -t cloudlessgr-app:$GIT_BRANCH-$GIT_COMMIT \
            .

      - name: Deploy to Docker registry
        run: |
          echo "­¤ÜĆ Deploying to Docker registry..."
          VERSION="${{ steps.version.outputs.version }}"
          GIT_COMMIT="${{ steps.version.outputs.git_commit }}"
          GIT_BRANCH="${{ steps.version.outputs.git_branch }}"

          # Login to Docker registry
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin "$DOCKER_REGISTRY"

          # Tag and push all versions
          docker tag cloudlessgr-app:latest "$DOCKER_REGISTRY/cloudlessgr-app:latest"
          docker tag cloudlessgr-app:v$VERSION "$DOCKER_REGISTRY/cloudlessgr-app:v$VERSION"
          docker tag cloudlessgr-app:v$VERSION-$GIT_COMMIT "$DOCKER_REGISTRY/cloudlessgr-app:v$VERSION-$GIT_COMMIT"

          docker push "$DOCKER_REGISTRY/cloudlessgr-app:latest"
          docker push "$DOCKER_REGISTRY/cloudlessgr-app:v$VERSION"
          docker push "$DOCKER_REGISTRY/cloudlessgr-app:v$VERSION-$GIT_COMMIT"

          echo "Ō£ģ Production deployment to registry completed"

      - name: Deploy infrastructure
        run: |
          echo "­¤ÅŚ’ĖÅ Deploying infrastructure..."
          # Add infrastructure deployment steps here
          echo "Ō£ģ Infrastructure deployment completed"
