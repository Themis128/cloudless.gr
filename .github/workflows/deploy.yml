name: Deploy

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    # environment: staging
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: .output/
          retention-days: 7
          
      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t cloudless:staging .
          
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Docker deployment example
          # docker run -d --name cloudless-staging -p 3000:3000 cloudless:staging
          
          # Or deploy to Docker registry
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag cloudless:staging ${{ secrets.DOCKER_REGISTRY }}/cloudless:staging
          docker push ${{ secrets.DOCKER_REGISTRY }}/cloudless:staging
          
          echo "✅ Staging deployment completed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: .output/
          retention-days: 30
          
      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t cloudless:production .
          
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment..."
          # Docker deployment example
          # docker run -d --name cloudless-production -p 3000:3000 cloudless:production
          
          # Or deploy to Docker registry
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag cloudless:production ${{ secrets.DOCKER_REGISTRY }}/cloudless:production
          docker push ${{ secrets.DOCKER_REGISTRY }}/cloudless:production
          
          echo "✅ Production deployment completed"
          
      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🚀 Production Deployment
            
            **Status:** ✅ Successfully deployed to production
            
            **Commit:** ${context.sha}
            **Branch:** ${context.ref}
            **Deployed by:** ${context.actor}
            **Deployed at:** ${new Date().toISOString()}
            
            ---
            **Production deployment completed successfully!**`;
            
            // Create a deployment notification issue
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production Deployment - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['deployment', 'production']
            }); 