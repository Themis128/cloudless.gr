name: Reusable Deployment Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string
      docker_image:
        description: 'Docker image to deploy'
        required: false
        type: string
      skip_docker:
        description: 'Skip Docker build'
        required: false
        default: false
        type: boolean
      health_check_url:
        description: 'Health check URL'
        required: false
        type: string
    secrets:
      inherit: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: themis128/cloudless.gr

jobs:
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: self-hosted
    if: inputs.skip_docker != 'true'
    timeout-minutes: 30
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy to ${{ inputs.environment }}
    runs-on: self-hosted
    needs: docker-build
    if: inputs.skip_docker == 'true' || needs.docker-build.result == 'success'
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Deploy to environment
        run: |
          echo "Deploying to ${{ inputs.environment }}..."
          
          # Set environment-specific variables
          export NODE_ENV=${{ inputs.environment }}
          
          # Run deployment script
          if [ -f "scripts/deploy/${{ inputs.environment }}.sh" ]; then
            chmod +x scripts/deploy/${{ inputs.environment }}.sh
            ./scripts/deploy/${{ inputs.environment }}.sh
          elif [ -f "scripts/deploy.sh" ]; then
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh ${{ inputs.environment }}
          else
            echo "No deployment script found for ${{ inputs.environment }}"
            echo "Skipping deployment..."
          fi

      - name: Health check
        if: inputs.health_check_url != ''
        run: |
          echo "Performing health check..."
          max_attempts=30
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Health check attempt $attempt/$max_attempts"
            
            if curl -f -s "${{ inputs.health_check_url }}" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            else
              echo "❌ Health check failed (attempt $attempt/$max_attempts)"
              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Health check failed after $max_attempts attempts"
                exit 1
              fi
              sleep 10
              attempt=$((attempt + 1))
            fi
          done

  post-deployment:
    name: 📊 Post-Deployment Checks
    runs-on: self-hosted
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run post-deployment tests
        run: |
          echo "Running post-deployment checks..."
          
          # Basic connectivity tests
          if [ -n "${{ inputs.health_check_url }}" ]; then
            echo "Testing application connectivity..."
            curl -f "${{ inputs.health_check_url }}" || echo "Warning: Health check failed"
          fi
          
          # Log deployment success
          echo "✅ Deployment to ${{ inputs.environment }} completed successfully"
          echo "Environment: ${{ inputs.environment }}"
          echo "Timestamp: $(date -u)"
          echo "Commit: ${{ github.sha }}"

  deployment-summary:
    name: 📋 Deployment Summary
    runs-on: self-hosted
    needs: [docker-build, deploy, post-deployment]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Build:** ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Post-Deployment:** ${{ needs.post-deployment.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Deployed to:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for details on what went wrong." >> $GITHUB_STEP_SUMMARY
          fi 