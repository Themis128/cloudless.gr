name: Reusable CI Base Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: string
      skip_tests:
        description: 'Skip testing phases'
        required: false
        default: false
        type: boolean
      skip_deployment:
        description: 'Skip deployment phase'
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: 'Force rebuild all caches'
        required: false
        default: false
        type: boolean
      runner_type:
        description: 'Type of runner to use'
        required: false
        default: 'self-hosted'
        type: string
    secrets:
      inherit: true

env:
  NODE_VERSION: '20'
  NODE_ENV: 'test'
  REGISTRY: ghcr.io
  IMAGE_NAME: themis128/cloudless.gr
  CACHE_DEPENDENCY_PATH: '**/package-lock.json'
  DOCKER_BUILDKIT: '1'
  ACTIONS_STEP_DEBUG: 'false'
  DEBUG: 'nuxt:*'
  NODE_OPTIONS: '--max-old-space-size=4096'
  NPM_CONFIG_LOGLEVEL: 'warn'
  NPM_CONFIG_CACHE: '.npm-cache'
  NPM_CONFIG_PREFER_OFFLINE: 'true'

jobs:
  validate:
    name: 🔍 Validate Configuration
    runs-on: ${{ inputs.runner_type }}
    timeout-minutes: 5
    outputs:
      should-skip: ${{ steps.skip-check.outputs.should-skip }}
      has-changes: ${{ steps.changes-check.outputs.has-changes }}
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cache key
        id: cache-key
        run: |
          CACHE_KEY="node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT

      - name: Check for skip patterns
        id: skip-check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should-skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null || echo "")
          
          if [ -n "$CHANGED_FILES" ]; then
            DOC_FILES=$(echo "$CHANGED_FILES" | grep -E '\.(md|txt|yml|yaml)$' | wc -l)
            CODE_FILES=$(echo "$CHANGED_FILES" | grep -vE '\.(md|txt|yml|yaml)$' | wc -l)
            
            if [ "$DOC_FILES" -gt 0 ] && [ "$CODE_FILES" -eq 0 ]; then
              echo "should-skip=true" >> $GITHUB_OUTPUT
            else
              echo "should-skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: changes-check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null || echo "")
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

  dependencies:
    name: 📦 Dependency Management
    runs-on: ${{ inputs.runner_type }}
    needs: validate
    if: needs.validate.outputs.should-skip != 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            */*/node_modules
            .npm-cache
          key: ${{ needs.validate.outputs.cache-key }}
          restore-keys: |
            node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: |
          if [ "${{ inputs.force_rebuild }}" == "true" ]; then
            rm -rf node_modules package-lock.json
            npm cache clean --force
          fi
          npm ci --prefer-offline --no-audit

      - name: Audit dependencies
        run: npm audit --audit-level=moderate || true

  security:
    name: 🛡️ Security & Quality
    runs-on: ${{ inputs.runner_type }}
    needs: [validate, dependencies]
    if: needs.validate.outputs.should-skip != 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            */*/node_modules
            .npm-cache
          key: ${{ needs.validate.outputs.cache-key }}
          restore-keys: |
            node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        run: npm run lint || true

      - name: Run TypeScript check
        run: npm run type-check || true

      - name: Security scan
        run: |
          # Basic security checks
          echo "Running security checks..."
          npm audit --audit-level=moderate || true
          
          # Check for secrets in code
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true
          fi

  build:
    name: 🏗️ Build & Test
    runs-on: ${{ inputs.runner_type }}
    needs: [validate, dependencies, security]
    if: needs.validate.outputs.should-skip != 'true' && inputs.skip_tests != 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            */*/node_modules
            .npm-cache
          key: ${{ needs.validate.outputs.cache-key }}
          restore-keys: |
            node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests
        run: npm run test || true

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            .nuxt
            .output
            dist
          retention-days: 7

  summary:
    name: 📋 Pipeline Summary
    runs-on: ${{ inputs.runner_type }}
    needs: [validate, dependencies, security, build]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate summary
        run: |
          echo "## 🚀 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner Type:** ${{ inputs.runner_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Skip Tests:** ${{ inputs.skip_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "**Skip Deployment:** ${{ inputs.skip_deployment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Force Rebuild:** ${{ inputs.force_rebuild }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
          echo "- **Validate:** ${{ needs.validate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependencies:** ${{ needs.dependencies.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security:** ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate.result }}" == "success" ] && [ "${{ needs.dependencies.result }}" == "success" ] && [ "${{ needs.security.result }}" == "success" ] && [ "${{ needs.build.result }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All jobs completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Some jobs failed. Check the logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi 