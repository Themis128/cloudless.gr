name: Security Scan

on:
  schedule:
    # Run security scans weekly on Mondays at 2 AM UTC
    - cron: '0 2 * * 1'
  push:
    branches:
      - main
      - develop
      - application
      - platform
  pull_request:
    branches:
      - main
      - develop
      - application
      - platform
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - dependencies
          - code
          - containers
          - secrets

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

env:
  NODE_VERSION: '20'
  SCAN_TIMEOUT: '10'

jobs:
  # =============================================================================
  # DEPENDENCY VULNERABILITY SCAN
  # =============================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == null
    outputs:
      vulnerabilities: ${{ steps.audit-check.outputs.vulnerabilities }}
      outdated_packages: ${{ steps.outdated-check.outputs.count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit-check
        run: |
          echo "🔍 Running npm audit..."
          npm audit --audit-level moderate --json > audit-results.json || true

          VULNERABILITIES=$(jq -r '.metadata.vulnerabilities.total // 0' audit-results.json 2>/dev/null || echo "0")
          echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT

          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "❌ Found $VULNERABILITIES vulnerabilities"
            exit 1
          else
            echo "✅ No vulnerabilities found"
          fi

      - name: Run audit-ci
        run: |
          echo "🔍 Running audit-ci..."
          npx audit-ci --moderate --report --output-format json > audit-ci-results.json || true

      - name: Check for outdated packages (non-blocking)
        id: outdated-check
        run: |
          echo "🔍 Checking for outdated packages..."

          # Check for outdated packages using exit code
          if npm outdated --silent 2>/dev/null; then
            echo "✅ All packages are up to date"
            echo "count=0" >> $GITHUB_OUTPUT
          else
            # Get the actual count by parsing the output
            OUTDATED_OUTPUT=$(npm outdated 2>/dev/null || echo "")
            if [ -n "$OUTDATED_OUTPUT" ]; then
              # Count lines minus header (if present)
              OUTDATED_COUNT=$(echo "$OUTDATED_OUTPUT" | tail -n +2 | wc -l)
              echo "⚠️ Found $OUTDATED_COUNT outdated packages"
              echo ""
              echo "📋 Outdated packages:"
              echo "$OUTDATED_OUTPUT"
              echo ""
              echo "::warning::Outdated packages found. Review and update as needed. This does not block the build."
              echo "count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT
            else
              echo "✅ All packages are up to date"
              echo "count=0" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload dependency scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-results
          path: |
            audit-results.json
            audit-ci-results.json
            npm-debug.log*
          retention-days: 30

  # =============================================================================
  # CODE SECURITY SCAN
  # =============================================================================
  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'code' || github.event.inputs.scan_type == null
    outputs:
      eslint_issues: ${{ steps.eslint-check.outputs.issues }}
      secrets_found: ${{ steps.secrets-check.outputs.count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security rules
        id: eslint-check
        run: |
          echo "🔍 Running ESLint security rules..."
          npx eslint . --ext .vue,.js,.ts,.jsx,.tsx --format json --output-file eslint-results.json || true

          # Parse ESLint results
          ISSUES=$(jq 'length' eslint-results.json 2>/dev/null || echo "0")
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

          if [ "$ISSUES" -gt 0 ]; then
            echo "⚠️ Found $ISSUES ESLint issues"
            npx eslint . --ext .vue,.js,.ts,.jsx,.tsx
          else
            echo "✅ No ESLint issues found"
          fi

      - name: Check for hardcoded secrets
        id: secrets-check
        run: |
          echo "🔍 Scanning for potential secrets..."

          # Create exclusion patterns
          EXCLUDE_DIRS="--exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.nuxt --exclude-dir=.output --exclude-dir=vanta-gallery"

          # Search for potential secrets
          SECRETS_FOUND=$(grep -r -i "password\|secret\|key\|token" . $EXCLUDE_DIRS | grep -v "your-" | grep -v "test-" | grep -v "development" | grep -v "placeholder" | wc -l)
          echo "count=$SECRETS_FOUND" >> $GITHUB_OUTPUT

          if [ "$SECRETS_FOUND" -gt 0 ]; then
            echo "⚠️ Found $SECRETS_FOUND potential secrets"
            grep -r -i "password\|secret\|key\|token" . $EXCLUDE_DIRS | grep -v "your-" | grep -v "test-" | grep -v "development" | grep -v "placeholder"
            exit 1
          else
            echo "✅ No obvious secrets found"
          fi

      - name: Check for dangerous dependencies
        run: |
          echo "🔍 Checking for dangerous dependencies..."
          npm list --depth=0 > dependency-list.txt
          echo "📋 Dependency list saved to artifact"

      - name: Upload code scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-scan-results
          path: |
            eslint-results.json
            dependency-list.txt
          retention-days: 30

  # =============================================================================
  # CONTAINER SECURITY SCAN
  # =============================================================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'containers' || github.event.inputs.scan_type == null
    outputs:
      dockerfiles_exist: ${{ steps.check-dockerfiles.outputs.exists }}
      trivy_vulnerabilities: ${{ steps.trivy-scan.outputs.vulnerabilities }}
      hadolint_issues: ${{ steps.hadolint-scan.outputs.issues }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Disable telemetry
        run: |
          echo "🔧 Disabling telemetry to prevent API permission issues..."
          export GITHUB_TOKEN_TELEMETRY_DISABLED=true

      - name: Check for Dockerfiles
        id: check-dockerfiles
        run: |
          if [ -f "Dockerfile" ] || [ -f "Dockerfile.dev" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Dockerfiles found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No Dockerfiles found - skipping container scan"
          fi

      - name: Set up Docker Buildx
        if: steps.check-dockerfiles.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        if: steps.check-dockerfiles.outputs.exists == 'true'
        run: |
          echo "🐳 Building Docker image for security scanning..."
          docker build -t cloudlessgr-app:security-scan -f Dockerfile --target runner .

      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        if: steps.check-dockerfiles.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cloudlessgr-app:security-scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Process Trivy results
        if: steps.check-dockerfiles.outputs.exists == 'true'
        run: |
          if [ -f "trivy-results.sarif" ]; then
            VULNERABILITIES=$(jq '.runs[0].results | length' trivy-results.sarif 2>/dev/null || echo "0")
            echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
            
            if [ "$VULNERABILITIES" -gt 0 ]; then
              echo "⚠️ Found $VULNERABILITIES container vulnerabilities"
            else
              echo "✅ No container vulnerabilities found"
            fi
          else
            echo "vulnerabilities=0" >> $GITHUB_OUTPUT
            echo "ℹ️ No Trivy results file found"
          fi

      - name: Upload Trivy results to GitHub Security tab
        if: steps.check-dockerfiles.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Hadolint for Dockerfile linting
        id: hadolint-scan
        if: steps.check-dockerfiles.outputs.exists == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
        continue-on-error: true

      - name: Process Hadolint results
        if: steps.check-dockerfiles.outputs.exists == 'true'
        run: |
          if [ -f "hadolint-results.sarif" ]; then
            ISSUES=$(jq '.runs[0].results | length' hadolint-results.sarif 2>/dev/null || echo "0")
            echo "issues=$ISSUES" >> $GITHUB_OUTPUT
            
            if [ "$ISSUES" -gt 0 ]; then
              echo "⚠️ Found $ISSUES Hadolint issues"
            else
              echo "✅ No Hadolint issues found"
            fi
          else
            echo "issues=0" >> $GITHUB_OUTPUT
            echo "ℹ️ No Hadolint results file found"
          fi

      - name: Upload Hadolint results to GitHub Security tab
        if: steps.check-dockerfiles.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'hadolint-results.sarif'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload container scan artifacts
        uses: actions/upload-artifact@v4
        if: always() && steps.check-dockerfiles.outputs.exists == 'true'
        with:
          name: container-scan-results
          path: |
            trivy-results.sarif
            hadolint-results.sarif
          retention-days: 30

  # =============================================================================
  # SECRETS DETECTION
  # =============================================================================
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'secrets' || github.event.inputs.scan_type == null
    outputs:
      trufflehog_findings: ${{ steps.trufflehog-scan.outputs.findings }}
      custom_scan_findings: ${{ steps.custom-scan.outputs.findings }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify .trufflehogignore configuration
        run: |
          echo "🔍 Verifying .trufflehogignore configuration..."
          if [ ! -f ".trufflehogignore" ]; then
            echo "❌ .trufflehogignore file not found"
            exit 1
          fi

          echo "✅ .trufflehogignore file exists"
          echo "📊 File size: $(wc -l < .trufflehogignore) lines"
          echo "📋 First few patterns:"
          head -5 .trufflehogignore
          echo "..."

      - name: Pre-filter obvious false positives
        run: |
          echo "🔍 Pre-filtering obvious false positives..."

          # Create a list of files to exclude from scanning
          find . -type f \( -name "*.vue" -o -name "*.css" -o -name "*.scss" -o -name "*.less" \) \
            ! -path "./node_modules/*" \
            ! -path "./.git/*" \
            ! -path "./.nuxt/*" \
            ! -path "./.output/*" \
            ! -path "./vanta-gallery/*" \
            ! -path "./dist/*" \
            ! -path "./build/*" \
            > vue-css-files.txt

          echo "📊 Found $(wc -l < vue-css-files.txt) Vue/CSS files (likely false positives)"
          echo "✅ These files will be excluded from detailed scanning"

      - name: Run custom secrets scanner
        id: custom-secrets-scan
        run: |
          echo "🔍 Running custom secrets scanner..."

          # Make script executable and run it
          chmod +x .github/scripts/custom-secrets-scan.sh
          .github/scripts/custom-secrets-scan.sh

          # Capture exit code
          EXIT_CODE=$?

          # Set output based on script results
          if [ $EXIT_CODE -eq 0 ]; then
            echo "findings=0" >> $GITHUB_OUTPUT
            echo "✅ Custom secrets scan completed successfully"
          else
            echo "findings=1" >> $GITHUB_OUTPUT
            echo "❌ Custom secrets scan found potential hardcoded secrets"
          fi
        continue-on-error: true

      - name: Run TruffleHog secrets scan (hardened)
        id: trufflehog-scan
        run: |
          echo "🔍 Running TruffleHog with hardened ignore rules..."

          # Run TruffleHog and output to JSON
          trufflehog filesystem . \
            --regex \
            --entropy=False \
            --exclude-paths .trufflehogignore \
            --exclude-files vue-css-files.txt \
            --json > scan-results.json || true

          # Count total matches
          MATCH_COUNT=$(jq 'length' scan-results.json)
          echo "📊 Total matches (raw): $MATCH_COUNT"

          # Define high-confidence secrets: API key prefixes and long base64/hex blobs
          REAL_MATCHES=$(jq '[.[] | select(.stringsFound[] | test("(?i)sk-[a-z0-9]{32,}|pk_[a-z0-9]{32,}|[a-z0-9+/=]{40,}"))] | length' scan-results.json)

          # Output results
          if [ "$REAL_MATCHES" -gt 0 ]; then
            echo "❌ Detected $REAL_MATCHES high-confidence secrets!"
            echo "📋 Raw findings:"
            jq -r '.[].stringsFound | join("\n")' scan-results.json | sort | uniq
            echo "findings=$REAL_MATCHES" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No high-confidence secrets detected (likely all false positives)"
            if [ "$MATCH_COUNT" -gt 0 ]; then
              echo "📋 False positive findings (ignored):"
              jq -r '.[].stringsFound | join("\n")' scan-results.json | sort | uniq
            fi
            echo "findings=0" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run enhanced secrets scan
        id: custom-scan
        run: |
          echo "🔍 Running enhanced secrets scan with intelligent filtering..."

          # Make script executable and run it
          chmod +x scripts/run-secrets-scan.sh
          ./scripts/run-secrets-scan.sh

          # Capture exit code
          EXIT_CODE=$?

          # Set output based on script results
          if [ $EXIT_CODE -eq 0 ]; then
            echo "findings=0" >> $GITHUB_OUTPUT
            echo "✅ Enhanced secrets scan completed successfully"
          else
            echo "findings=1" >> $GITHUB_OUTPUT
            echo "⚠️ Enhanced secrets scan found issues (check output above)"
          fi
        continue-on-error: true

  # =============================================================================
  # SECURITY SUMMARY
  # =============================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, container-scan, secrets-scan]
    if: always()
    outputs:
      overall_status: ${{ steps.summary.outputs.status }}
      core_passed: ${{ steps.summary.outputs.core_passed }}
    steps:
      - name: Generate comprehensive security summary
        id: summary
        run: |
          echo "🔒 Security Scan Summary"
          echo "========================="
          echo "📅 Scan Date: $(date)"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "📝 Commit: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo ""

          # Job results
          echo "📊 Job Results:"
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}"
          echo "- Code Scan: ${{ needs.code-scan.result }}"
          echo "- Container Scan: ${{ needs.container-scan.result }}"
          echo "- Secrets Scan: ${{ needs.secrets-scan.result }}"
          echo ""

          # Detailed findings
          echo "🔍 Detailed Findings:"
          if [ "${{ needs.dependency-scan.outputs.vulnerabilities }}" != "" ]; then
            echo "- Dependencies: ${{ needs.dependency-scan.outputs.vulnerabilities }} vulnerabilities"
          fi
          if [ "${{ needs.dependency-scan.outputs.outdated_packages }}" != "" ]; then
            echo "- Outdated Packages: ${{ needs.dependency-scan.outputs.outdated_packages }} packages need updates"
          fi
          if [ "${{ needs.code-scan.outputs.eslint_issues }}" != "" ]; then
            echo "- Code Quality: ${{ needs.code-scan.outputs.eslint_issues }} ESLint issues"
          fi
          if [ "${{ needs.container-scan.outputs.trivy_vulnerabilities }}" != "" ]; then
            echo "- Container: ${{ needs.container-scan.outputs.trivy_vulnerabilities }} vulnerabilities"
          fi
          if [ "${{ needs.secrets-scan.outputs.custom_scan_findings }}" != "" ]; then
            echo "- Secrets: ${{ needs.secrets-scan.outputs.custom_scan_findings }} potential findings"
          fi
          if [ "${{ needs.secrets-scan.outputs.trufflehog_findings }}" != "" ]; then
            echo "- TruffleHog: ${{ needs.secrets-scan.outputs.trufflehog_findings }} findings"
          fi
          echo ""

          # Determine overall status
          CORE_SUCCESS=true
          OPTIONAL_WARNINGS=false

          # Check core security jobs
          if [ "${{ needs.dependency-scan.result }}" != "success" ]; then
            echo "❌ Dependency scan failed"
            CORE_SUCCESS=false
          fi

          if [ "${{ needs.code-scan.result }}" != "success" ]; then
            echo "❌ Code scan failed"
            CORE_SUCCESS=false
          fi

          # Check optional jobs
          if [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "⚠️ Secrets scan had issues (likely false positives)"
            echo "📋 Review the scan output above for details"
            echo "🔍 All findings are documented in SECRETS_SCAN_ANALYSIS.md"
            OPTIONAL_WARNINGS=true
          fi

          if [ "${{ needs.container-scan.result }}" != "success" ]; then
            echo "⚠️ Container scan had issues"
            OPTIONAL_WARNINGS=true
          fi

          echo ""
          if [ "$CORE_SUCCESS" = true ]; then
            echo "✅ Core security checks passed!"
            echo "core_passed=true" >> $GITHUB_OUTPUT
            
            if [ "$OPTIONAL_WARNINGS" = false ]; then
              echo "🎉 All security checks passed successfully!"
              echo "🚀 Your code is ready for deployment"
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Core checks passed, but some optional checks had issues"
              echo "📋 Review the warnings above for potential improvements"
              echo "status=warning" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ Core security checks failed. Please review the results above."
            echo "🔧 Fix the issues before proceeding with deployment"
            echo "core_passed=false" >> $GITHUB_OUTPUT
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

          echo ""
          echo "📈 Security Scan Statistics:"
          echo "- Total jobs: 4"
          echo "- Core jobs: 2 (dependency, code)"
          echo "- Optional jobs: 2 (secrets, container)"
          echo "- Success rate: $([ "$CORE_SUCCESS" = true ] && echo "100%" || echo "0%") for core jobs"
          echo ""
          echo "🔧 Configuration:"
          echo "- Node.js version: ${{ env.NODE_VERSION }}"
          echo "- Scan timeout: ${{ env.SCAN_TIMEOUT }} minutes"
          echo "- TruffleHog exclusions: .trufflehogignore"
          echo "- Custom scan patterns: Enhanced filtering"
