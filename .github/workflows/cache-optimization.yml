---
name: Cache Optimization Strategy

on:
  workflow_dispatch:
    inputs:
      cache_type:
        description: 'Type of cache to optimize'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - npm
          - docker
          - nuxt
          - playwright

permissions:
  contents: read
  actions: read

jobs:
  cache-optimization:
    name: '🔧 Cache Optimization'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with optimized cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build application with Nuxt cache
        run: npm run build
        env:
          NODE_ENV: production

      - name: Cache Nuxt build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .nuxt
            .output
            node_modules/.cache
          key: >-
            ${{ runner.os }}-nuxt-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Cache optimization summary
        run: |
          echo "📊 Cache Optimization Summary"
          echo "=============================="
          echo "✅ Node.js cache configured"
          echo "✅ Nuxt build cache configured"
          echo "✅ Docker layer cache configured"
          echo "✅ Playwright browser cache configured"
          echo ""
          echo "💡 Cache hit rates will improve build times"
          echo "🔧 Monitor cache effectiveness in Actions tab"


