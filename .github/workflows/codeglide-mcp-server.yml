name: CodeGlide MCP Server Generation

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CodeGlide MCP Server generator
        run: |
          docker run --pull=always --platform linux/amd64 --rm -i \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -e MCP_CLIENT=github-actions \
            -v codeglide-data:/var/codeglide/data \
            ghcr.io/codeglide/extension:latest

      - name: Output generated artifact location
        run: echo "Generated MCP server artifacts should be available under ${{ github.workspace }}-codeglide-extension-artifacts or inside the repository workspace after generation."
