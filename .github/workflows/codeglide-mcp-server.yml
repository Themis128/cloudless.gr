name: CodeGlide MCP Server Generation

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run CodeGlide MCP Server generator
        run: |
          docker run --pull=always --platform linux/amd64 --rm -i \
            -v "${{ github.workspace }}:/app/input" \
            -v "${{ github.workspace }}:/app/output" \
            -e MCP_CLIENT=github-actions \
            -v codeglide-data:/var/codeglide/data \
            ghcr.io/codeglide/extension:latest

      - name: Output generated artifact location
        run: echo "Generated MCP server artifacts available under ${{ github.workspace }}"
