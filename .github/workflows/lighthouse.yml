name: Lighthouse Audit

on:
  workflow_run:
    workflows: ['Deploy to Production']
    types: [completed]
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit'
        default: 'https://cloudless.gr'

permissions:
  contents: read

jobs:
  audit:
    name: Performance Audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ github.event.inputs.url || 'https://cloudless.gr' }}
            ${{ github.event.inputs.url || 'https://cloudless.gr/en' }}
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Surface per-route scores inline
        run: |
          MANIFEST='${{ steps.lighthouse.outputs.manifest }}'

          echo "## 🔦 Lighthouse Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Route | Perf | A11y | Best Practices | SEO |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|------|----------------|-----|" >> "$GITHUB_STEP_SUMMARY"

          echo "$MANIFEST" | jq -r '.[] |
            .url as $url |
            (.summary.performance        * 100 | round) as $perf |
            (.summary.accessibility      * 100 | round) as $a11y |
            (.summary["best-practices"]  * 100 | round) as $bp   |
            (.summary.seo                * 100 | round) as $seo  |
            "| \($url) | \($perf) | \($a11y) | \($bp) | \($seo) |"
          ' >> "$GITHUB_STEP_SUMMARY"

          # Fail if any route scores below thresholds
          FAILED=$(echo "$MANIFEST" | jq '[.[] | select(
            .summary.performance       < 0.75 or
            .summary.accessibility     < 0.90 or
            .summary["best-practices"] < 0.85 or
            .summary.seo               < 0.90
          ) | .url] | length')

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ **$FAILED route(s) fell below score thresholds.**" >> "$GITHUB_STEP_SUMMARY"
            echo "Thresholds: Performance ≥ 75 · Accessibility ≥ 90 · Best Practices ≥ 85 · SEO ≥ 90" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All routes passed Lighthouse thresholds." >> "$GITHUB_STEP_SUMMARY"
