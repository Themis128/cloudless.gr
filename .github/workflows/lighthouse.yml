name: Lighthouse Audit

on:
  workflow_run:
    workflows: ['Deploy to Production']
    types: [completed]
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit'
        default: 'https://cloudless.gr'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: Performance Audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ github.event.inputs.url || 'https://cloudless.gr' }}
            ${{ github.event.inputs.url || 'https://cloudless.gr/en' }}
            ${{ github.event.inputs.url || 'https://cloudless.gr/services' }}
            ${{ github.event.inputs.url || 'https://cloudless.gr/contact' }}
            ${{ github.event.inputs.url || 'https://cloudless.gr/store' }}
          # 3 runs per URL → median absorbs single-run CI variance (TBT
          # alone has been observed to swing 11x between runs on identical
          # infra). Threshold step below asserts on the median.
          runs: 3
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Surface per-route scores inline
        env:
          MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
        run: |
          # ── Guard: validate manifest JSON before parsing ──
          if [ -z "$MANIFEST" ]; then
            echo "::error::Lighthouse manifest output is empty"
            exit 1
          fi
          if ! echo "$MANIFEST" | jq empty 2>/dev/null; then
            echo "::error::Lighthouse manifest is not valid JSON"
            echo "Raw manifest: $MANIFEST"
            exit 1
          fi

          # Group multi-run manifest by URL and reduce to the median per metric.
          MEDIANS=$(echo "$MANIFEST" | jq '[
            group_by(.url)[]
            | {
                url: .[0].url,
                perf: ([.[].summary.performance]        | sort | .[(length / 2) | floor]),
                a11y: ([.[].summary.accessibility]      | sort | .[(length / 2) | floor]),
                bp:   ([.[].summary["best-practices"]]  | sort | .[(length / 2) | floor]),
                seo:  ([.[].summary.seo]                | sort | .[(length / 2) | floor])
              }
          ]')

          echo "## 🔦 Lighthouse Results (median of 3 runs)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Route | Perf | A11y | Best Practices | SEO |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|------|----------------|-----|" >> "$GITHUB_STEP_SUMMARY"

          ROWS=$(echo "$MEDIANS" | jq -r '.[] |
            "| \(.url) | \((.perf * 100) | round) | \((.a11y * 100) | round) | \((.bp * 100) | round) | \((.seo * 100) | round) |"
          ')
          echo "$ROWS" >> "$GITHUB_STEP_SUMMARY"
          echo "$ROWS"

          # Fail if any route's median falls below thresholds
          FAILED_URLS=$(echo "$MEDIANS" | jq -r '[.[] | select(
            .perf < 0.65 or .a11y < 0.90 or .bp < 0.90 or .seo < 0.90
          ) | .url] | .[]')

          FAILED=$(echo "$MEDIANS" | jq '[.[] | select(
            .perf < 0.65 or .a11y < 0.90 or .bp < 0.90 or .seo < 0.90
          ) | .url] | length')

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "❌ $FAILED route(s) fell below score thresholds (median of 3 runs):"
            echo "$FAILED_URLS"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ **$FAILED route(s) fell below score thresholds (median of 3 runs).**" >> "$GITHUB_STEP_SUMMARY"
            echo "Thresholds: Performance ≥ 65 · Accessibility ≥ 90 · Best Practices ≥ 90 · SEO ≥ 90" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo ""
          echo "✅ All routes passed (median of 3 runs)."
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All routes passed Lighthouse thresholds (median of 3 runs; Perf ≥ 65 · A11y ≥ 90 · BP ≥ 90 · SEO ≥ 90)." >> "$GITHUB_STEP_SUMMARY"
