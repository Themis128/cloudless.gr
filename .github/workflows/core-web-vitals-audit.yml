name: Core Web Vitals Route Audit

on:
  workflow_run:
    workflows: ['Deploy to Production']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Route-level Lighthouse
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - name: Run Lighthouse on key routes
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://cloudless.gr
            https://cloudless.gr/en
            https://cloudless.gr/services
            https://cloudless.gr/contact
            https://cloudless.gr/store
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Surface per-route CWV scores inline
        run: |
          MANIFEST='${{ steps.lhci.outputs.manifest }}'

          echo "## 📊 Core Web Vitals Route Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Route | Perf | A11y | Best Practices | SEO |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|------|----------------|-----|" >> "$GITHUB_STEP_SUMMARY"

          echo "$MANIFEST" | jq -r '.[] |
            .url as $url |
            (.summary.performance        * 100 | round) as $perf |
            (.summary.accessibility      * 100 | round) as $a11y |
            (.summary["best-practices"]  * 100 | round) as $bp   |
            (.summary.seo                * 100 | round) as $seo  |
            "| \($url) | \($perf) | \($a11y) | \($bp) | \($seo) |"
          ' >> "$GITHUB_STEP_SUMMARY"

          # Fail if any route scores below thresholds
          # Thresholds reflect real Lambda/cold-start perf and current a11y state.
          # Tighten these incrementally as scores improve.
          FAILED=$(echo "$MANIFEST" | jq '[.[] | select(
            .summary.performance       < 0.60 or
            .summary.accessibility     < 0.80 or
            .summary["best-practices"] < 0.85 or
            .summary.seo               < 0.90
          ) | .url] | length')

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ **$FAILED route(s) fell below score thresholds.**" >> "$GITHUB_STEP_SUMMARY"
            echo "Thresholds: Performance ≥ 60 · Accessibility ≥ 80 · Best Practices ≥ 85 · SEO ≥ 90" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All routes passed Core Web Vitals thresholds (Perf ≥ 60 · A11y ≥ 80 · BP ≥ 85 · SEO ≥ 90)." >> "$GITHUB_STEP_SUMMARY"
