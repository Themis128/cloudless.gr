name: Core Web Vitals Route Audit

on:
  workflow_run:
    workflows: ['Deploy to Production']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: Route-level Lighthouse
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - name: Run Lighthouse on key routes
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://cloudless.gr
            https://cloudless.gr/en
            https://cloudless.gr/services
            https://cloudless.gr/contact
            https://cloudless.gr/store
          # 3 runs per URL → median absorbs single-run CI variance.
          runs: 3
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Surface per-route CWV scores inline
        env:
          MANIFEST: ${{ steps.lhci.outputs.manifest }}
        run: |
          # Group multi-run manifest by URL and reduce to the median per metric.
          MEDIANS=$(echo "$MANIFEST" | jq '[
            group_by(.url)[]
            | {
                url: .[0].url,
                perf: ([.[].summary.performance]        | sort | .[(length / 2) | floor]),
                a11y: ([.[].summary.accessibility]      | sort | .[(length / 2) | floor]),
                bp:   ([.[].summary["best-practices"]]  | sort | .[(length / 2) | floor]),
                seo:  ([.[].summary.seo]                | sort | .[(length / 2) | floor])
              }
          ]')

          echo "## 📊 Core Web Vitals Route Audit (median of 3 runs)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Route | Perf | A11y | Best Practices | SEO |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|------|----------------|-----|" >> "$GITHUB_STEP_SUMMARY"

          echo "$MEDIANS" | jq -r '.[] |
            "| \(.url) | \((.perf * 100) | round) | \((.a11y * 100) | round) | \((.bp * 100) | round) | \((.seo * 100) | round) |"
          ' >> "$GITHUB_STEP_SUMMARY"

          # Fail if any route's median falls below thresholds
          FAILED=$(echo "$MEDIANS" | jq '[.[] | select(
            .perf < 0.65 or .a11y < 0.90 or .bp < 0.90 or .seo < 0.90
          ) | .url] | length')

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ **$FAILED route(s) fell below score thresholds (median of 3 runs).**" >> "$GITHUB_STEP_SUMMARY"
            echo "Thresholds: Performance ≥ 65 · Accessibility ≥ 90 · Best Practices ≥ 90 · SEO ≥ 90" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All routes passed Core Web Vitals thresholds (median of 3 runs; Perf ≥ 65 · A11y ≥ 90 · BP ≥ 90 · SEO ≥ 90)." >> "$GITHUB_STEP_SUMMARY"
