name: Core Web Vitals Route Audit

on:
  workflow_run:
    workflows: ['Deploy to Production']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Route-level Lighthouse
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Run Lighthouse on key routes
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://cloudless.gr
            https://cloudless.gr/en
            https://cloudless.gr/services
            https://cloudless.gr/contact
            https://cloudless.gr/store
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Surface per-route CWV scores inline
        run: |
          MANIFEST='${{ steps.lhci.outputs.manifest }}'

          echo "## 📊 Core Web Vitals Route Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Route | Perf | A11y | Best Practices | SEO |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|------|----------------|-----|" >> "$GITHUB_STEP_SUMMARY"

          echo "$MANIFEST" | jq -r '.[] |
            .url as $url |
            (.summary.performance        * 100 | round) as $perf |
            (.summary.accessibility      * 100 | round) as $a11y |
            (.summary["best-practices"]  * 100 | round) as $bp   |
            (.summary.seo                * 100 | round) as $seo  |
            "| \($url) | \($perf) | \($a11y) | \($bp) | \($seo) |"
          ' >> "$GITHUB_STEP_SUMMARY"

          # Fail if any route scores below thresholds
          FAILED=$(echo "$MANIFEST" | jq '[.[] | select(
            .summary.performance       < 0.65 or
            .summary.accessibility     < 0.90 or
            .summary["best-practices"] < 0.90 or
            .summary.seo               < 0.91
          ) | .url] | length')

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ **$FAILED route(s) fell below score thresholds.**" >> "$GITHUB_STEP_SUMMARY"
            echo "Thresholds: Performance ≥ 65 · Accessibility ≥ 90 · Best Practices ≥ 90 · SEO ≥ 91" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All routes passed Core Web Vitals thresholds (Perf ≥ 65 · A11y ≥ 90 · BP ≥ 90 · SEO ≥ 91)." >> "$GITHUB_STEP_SUMMARY"
