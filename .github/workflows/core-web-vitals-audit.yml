name: Core Web Vitals Route Audit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows: ['Deploy to Production']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Route-level Lighthouse
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - name: Run Lighthouse on key routes
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://cloudless.gr
            https://cloudless.gr/en
            https://cloudless.gr/services
            https://cloudless.gr/contact
            https://cloudless.gr/store
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Write summary
        run: |
          echo "## Core Web Vitals Route Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Audited routes: /, /en, /services, /contact, /store" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See uploaded lighthouse artifacts for route-level details." >> "$GITHUB_STEP_SUMMARY"
