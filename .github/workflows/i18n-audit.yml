name: I18N Quality Audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/locales/**'
      - 'src/lib/i18n.ts'
      - '__tests__/locales-parity.test.ts'
      - 'scripts/audit/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  i18n:
    name: Locale Parity and Placeholder Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:ci -- __tests__/locales-parity.test.ts
      - run: node scripts/audit/check-i18n-placeholders.mjs
