name: 🚀 Release & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # === Quality Assurance ===
  quality-check:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Node.js dependencies
        run: npm ci

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📏 Lint code
        run: npm run lint

      - name: 🔍 Type check
        run: npm run type-check

      - name: 🧪 Run tests
        run: |
          npm run test:coverage
          npm run test:python

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            coverage/
          retention-days: 30

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./test-results/coverage.xml,./test-results/vitest-coverage.xml
          flags: unittests
          name: cloudless-gr-coverage

  # === Build & Test ===
  build-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 20

    strategy:
      matrix:
        target: [development, production]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build
        env:
          NODE_ENV: ${{ matrix.target == 'production' && 'production' || 'development' }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          tags: cloudless-gr:${{ matrix.target }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image-${{ matrix.target }}.tar

      - name: 📦 Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.target }}
          path: /tmp/image-${{ matrix.target }}.tar
          retention-days: 7

  # === Security Scan ===
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔒 Run security audit
        run: npm audit --audit-level high

      - name: 🐍 Python security check
        run: |
          pip install safety bandit
          safety check -r requirements.txt
          bandit -r . -x tests/,node_modules/,shared_venv/

      - name: 📥 Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-production
          path: /tmp

      - name: 🐳 Load Docker image
        run: docker load --input /tmp/image-production.tar

      - name: 🔒 Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cloudless-gr:production-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # === Release ===
  release:
    name: 📦 Release
    runs-on: ubuntu-latest
    needs: [quality-check, build-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 15

    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🏷️ Create release
        id: release
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            npm run release:${{ github.event.inputs.release_type }}
          else
            npm run release
          fi

          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 📥 Download Docker images
        uses: actions/download-artifact@v4
        with:
          pattern: docker-image-*
          path: /tmp/images

      - name: 🐳 Load and tag Docker images
        run: |
          docker load --input /tmp/images/docker-image-development/image-development.tar
          docker load --input /tmp/images/docker-image-production/image-production.tar

          docker tag cloudless-gr:development-${{ github.sha }} cloudless-gr:development
          docker tag cloudless-gr:production-${{ github.sha }} cloudless-gr:production
          docker tag cloudless-gr:production-${{ github.sha }} cloudless-gr:${{ steps.release.outputs.version }}
          docker tag cloudless-gr:production-${{ github.sha }} cloudless-gr:latest

      - name: 🐳 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Push Docker images
        run: |
          docker tag cloudless-gr:development ghcr.io/${{ github.repository }}:development
          docker tag cloudless-gr:production ghcr.io/${{ github.repository }}:production
          docker tag cloudless-gr:${{ steps.release.outputs.version }} ghcr.io/${{ github.repository }}:${{ steps.release.outputs.version }}
          docker tag cloudless-gr:latest ghcr.io/${{ github.repository }}:latest

          docker push ghcr.io/${{ github.repository }}:development
          docker push ghcr.io/${{ github.repository }}:production
          docker push ghcr.io/${{ github.repository }}:${{ steps.release.outputs.version }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: 📝 Generate release notes
        id: release_notes
        run: |
          echo "## 🎉 Release ${{ steps.release.outputs.tag }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Docker Images" >> release_notes.md
          echo "- \`ghcr.io/${{ github.repository }}:${{ steps.release.outputs.version }}\`" >> release_notes.md
          echo "- \`ghcr.io/${{ github.repository }}:latest\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📋 Changes" >> release_notes.md

          # Extract changes from CHANGELOG.md
          sed -n "/^## \[${{ steps.release.outputs.version }}\]/,/^## \[/p" CHANGELOG.md | head -n -1 | tail -n +2 >> release_notes.md

      - name: 🎉 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          release_name: Release ${{ steps.release.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.release.outputs.version, '-') }}

  # === Deployment ===
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    environment: staging
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Deploy to staging
        run: |
          echo "🚀 Deploying version ${{ needs.release.outputs.version }} to staging..."
          # Add your staging deployment commands here
          # Example: kubectl set image deployment/app app=ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [release, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Deploy to production
        run: |
          echo "🚀 Deploying version ${{ needs.release.outputs.version }} to production..."
          # Add your production deployment commands here
          # Example: kubectl set image deployment/app app=ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}

      - name: 🔔 Notify deployment
        run: |
          echo "✅ Successfully deployed version ${{ needs.release.outputs.version }} to production!"
          # Add notification logic (Slack, email, etc.)
