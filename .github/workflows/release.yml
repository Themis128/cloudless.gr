name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      release_type:
        description: 'Type of release'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  NODE_VERSION: '20'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Bump version
        run: |
          echo "📦 Bumping version..."
          npm version ${{ github.event.inputs.release_type }} --no-git-tag-version
          
      - name: Create git tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin HEAD --tags
          
      - name: Build application
        run: npm run build
        
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Release v${{ steps.version.outputs.version }}
            
            ### What's New
            - Bug fixes and improvements
            - Performance optimizations
            - Security updates
            
            ### Installation
            ```bash
            npm install
            ```
            
            ### Build
            ```bash
            npm run build
            ```
            
            ---
            *This release was automatically generated by GitHub Actions*
          draft: false
          prerelease: false

  build-and-upload:
    name: Build and Upload Release Assets
    runs-on: ubuntu-latest
    needs: create-release
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Create release archive
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar -czf cloudless-v$VERSION.tar.gz .output/
          zip -r cloudless-v$VERSION.zip .output/
          
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./cloudless-v${{ steps.version.outputs.version }}.tar.gz
          asset_name: cloudless-v${{ steps.version.outputs.version }}.tar.gz
          asset_content_type: application/gzip
          
      - name: Upload Release Assets (ZIP)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./cloudless-v${{ steps.version.outputs.version }}.zip
          asset_name: cloudless-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czf cloudless-v$VERSION.tar.gz .output/
          zip -r cloudless-v$VERSION.zip .output/
          
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🚀 Release ${{ github.ref }}
            
            ### What's New
            - Bug fixes and improvements
            - Performance optimizations
            - Security updates
            
            ### Installation
            ```bash
            npm install
            ```
            
            ### Build
            ```bash
            npm run build
            ```
            
            ---
            *This release was automatically generated by GitHub Actions*
          draft: false
          prerelease: false
          
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./cloudless-v${{ steps.version.outputs.version }}.tar.gz
          asset_name: cloudless-v${{ steps.version.outputs.version }}.tar.gz
          asset_content_type: application/gzip
          
      - name: Upload Release Assets (ZIP)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./cloudless-v${{ steps.version.outputs.version }}.zip
          asset_name: cloudless-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-and-upload, tag-release]
    if: always()
    steps:
      - name: Generate release notification
        run: |
          echo "🎉 Release Summary"
          echo "=================="
          echo "📅 Date: $(date)"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "🏷️ Tag: ${{ github.ref }}"
          echo ""
          echo "📊 Job Results:"
          echo "- Create Release: ${{ needs.create-release.result }}"
          echo "- Build and Upload: ${{ needs.build-and-upload.result }}"
          echo "- Tag Release: ${{ needs.tag-release.result }}"
          echo ""
          
          if [ "${{ needs.create-release.result }}" = "success" ] || [ "${{ needs.tag-release.result }}" = "success" ]; then
            echo "✅ Release completed successfully!"
          else
            echo "❌ Release failed. Please check the job results above."
          fi 