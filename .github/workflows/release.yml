name: 🚀 Release Management

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Create as prerelease'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean
      auto_merge:
        description: 'Auto-merge dependency updates'
        required: false
        default: false
        type: boolean
      notify:
        description: 'Send notifications'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: '📦 Version Management'
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    outputs:
      new-version: ${{ steps.bump-version.outputs.new-version }}
      release-notes: ${{ steps.generate-notes.outputs.release-notes }}
      changelog: ${{ steps.generate-changelog.outputs.changelog }}
      is-prerelease: ${{ steps.check-prerelease.outputs.is-prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump version
        id: bump-version
        run: |
          if [ "${{ inputs.release_type }}" == "patch" ]; then
            npm version patch --no-git-tag-version
          elif [ "${{ inputs.release_type }}" == "minor" ]; then
            npm version minor --no-git-tag-version
          elif [ "${{ inputs.release_type }}" == "major" ]; then
            npm version major --no-git-tag-version
          fi
          
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Generate release notes
        id: generate-notes
        run: |
          # Generate release notes from commits
          RELEASE_NOTES=$(git log --oneline --no-merges $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD | head -20)
          echo "release-notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: generate-changelog
        run: |
          # Generate changelog
          CHANGELOG=$(git log --pretty=format:"- %s" --no-merges $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if prerelease
        id: check-prerelease
        run: |
          if [ "${{ inputs.prerelease }}" == "true" ]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump-version.outputs.new-version }}"
          git push

  create-release:
    name: '🚀 Create Release'
    runs-on: self-hosted
    needs: version
    if: github.event_name == 'workflow_dispatch' && needs.version.result == 'success'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.version.outputs.new-version }}
          release_name: Release v${{ needs.version.outputs.new-version }}
          body: |
            ## What's Changed
            
            ${{ needs.version.outputs.release-notes }}
            
            ## Changelog
            
            ${{ needs.version.outputs.changelog }}
            
            ## Installation
            
            ```bash
            npm install @cloudless/gr@${{ needs.version.outputs.new-version }}
            ```
          draft: ${{ inputs.draft }}
          prerelease: ${{ needs.version.outputs.is-prerelease }}

  deploy-release:
    name: '🚀 Deploy Release'
    runs-on: self-hosted
    needs: [version, create-release]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && needs.create-release.result == 'success')
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build application
        run: npm run build

      - name: Deploy to production
        run: |
          echo "Deploying release to production..."
          
          # Set production environment
          export NODE_ENV=production
          
          # Run deployment script
          if [ -f "scripts/deploy/production.sh" ]; then
            chmod +x scripts/deploy/production.sh
            ./scripts/deploy/production.sh
          elif [ -f "scripts/deploy.sh" ]; then
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh production
          else
            echo "No production deployment script found"
            echo "Skipping deployment..."
          fi

      - name: Health check
        run: |
          echo "Performing health check..."
          max_attempts=30
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Health check attempt $attempt/$max_attempts"
            
            if curl -f -s "https://cloudless.gr/api/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            else
              echo "❌ Health check failed (attempt $attempt/$max_attempts)"
              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Health check failed after $max_attempts attempts"
                exit 1
              fi
              sleep 10
              attempt=$((attempt + 1))
            fi
          done

  notify:
    name: '📢 Send Notifications'
    runs-on: self-hosted
    needs: [version, create-release, deploy-release]
    if: |
      always() && 
      inputs.notify == true && 
      (needs.create-release.result == 'success' || needs.deploy-release.result == 'success')
    timeout-minutes: 5
    steps:
      - name: Send release notification
        run: |
          echo "Sending release notification..."
          
          # Log release information
          echo "## 🎉 Release Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.new-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ needs.create-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ needs.deploy-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-release.result }}" == "success" ]; then
            echo "✅ **Release deployed successfully to production!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Release created but deployment may have failed**" >> $GITHUB_STEP_SUMMARY
          fi

  release-summary:
    name: '📋 Release Summary'
    runs-on: self-hosted
    needs: [version, create-release, deploy-release, notify]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Generate release summary
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Information:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.version.outputs.new-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Prerelease:** ${{ inputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Draft:** ${{ inputs.draft }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Management:** ${{ needs.version.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Create Release:** ${{ needs.create-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Release:** ${{ needs.deploy-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Notifications:** ${{ needs.notify.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-release.result }}" == "success" ]; then
            echo "✅ **Release completed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "Production deployment is live." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Release failed!**" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi 