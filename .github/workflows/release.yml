name: Release

on:
  workflow_run:
    workflows: [Deploy to Production]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}-build.${{ github.event.workflow_run.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check_tag.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            const sha = '${{ github.event.workflow_run.head_sha }}';
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: sha,
              name: tag,
              body: `Production deploy #${{ github.event.workflow_run.run_number }} succeeded.\n\n**Deploy run:** ${runUrl}\n**Commit:** ${sha.slice(0, 7)}`,
              draft: false,
              prerelease: false,
              generate_release_notes: true,
            });
