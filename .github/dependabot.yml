# Dependabot configuration for cloudless.gr
# This file configures how Dependabot handles dependency updates

version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Themis128"
    assignees:
      - "Themis128"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
      - "security"
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: "@nuxt/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "nuxt"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pinia"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vuetify"
        update-types: ["version-update:semver-major"]
      # Ignore problematic downgrades
      - dependency-name: "vuedraggable"
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "Themis128"
    assignees:
      - "Themis128"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"

  # Enable version updates for Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 2
    reviewers:
      - "Themis128"
    assignees:
      - "Themis128"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "automated"

# Global settings
registries:
  # Add any private registries if needed
  # npm-registry:
  #   type: npm-registry
  #   url: https://registry.npmjs.org/
  #   token: ${{ secrets.NPM_TOKEN }}

# Group configuration for reducing PR noise
groups:
  # Group critical security updates together
  critical-security:
    patterns:
      - "webpack*"
      - "body-parser"
      - "braces*"
      - "cookie"
      - "cross-spawn"
      - "semver"
      - "ws"
      - "path-to-regexp"
      - "loader-utils"
      - "minimist"
      - "tough-cookie"
      - "follow-redirects"
    update-types:
      - "minor"
      - "patch"
    dependency-type: "direct"
    labels:
      - "security"
      - "critical"

  # Group Nuxt ecosystem updates
  nuxt-ecosystem:
    patterns:
      - "@nuxt/*"
      - "nuxt"
      - "nitropack"
      - "nuxi"
    update-types:
      - "minor"
      - "patch"
    labels:
      - "nuxt"
      - "framework"

  # Group Vue ecosystem updates
  vue-ecosystem:
    patterns:
      - "vue*"
      - "@vue/*"
      - "pinia"
      - "vue-router"
    update-types:
      - "minor"
      - "patch"
    labels:
      - "vue"
      - "frontend"

  # Group UI and styling updates
  ui-styling:
    patterns:
      - "vuetify*"
      - "@mdi/*"
      - "vanta*"
      - "echarts"
      - "vue-echarts"
    update-types:
      - "minor"
      - "patch"
    labels:
      - "ui"
      - "styling"

  # Group development and build tools
  dev-build-tools:
    patterns:
      - "vite*"
      - "webpack*"
      - "rollup*"
      - "babel*"
      - "esbuild*"
      - "terser*"
    update-types:
      - "minor"
      - "patch"
    labels:
      - "build"
      - "dev-tools"

  # Group testing and quality tools
  testing-quality:
    patterns:
      - "@types/*"
      - "prettier*"
      - "jest*"
      - "vitest*"
      - "playwright*"
      - "husky"
      - "lint-staged"
    update-types:
      - "minor"
      - "patch"
    exclude-patterns:
      - "@types/node"
    labels:
      - "testing"
      - "quality"

  # Group ESLint updates (including major versions for consideration)
  eslint-updates:
    patterns:
      - "eslint*"
      - "@nuxt/eslint-config"
    update-types:
      - "minor"
      - "patch"
      - "version-update:semver-major"
    labels:
      - "eslint"
      - "code-quality"
      - "breaking-changes"

  # Group utility and helper libraries
  utilities:
    patterns:
      - "lodash*"
      - "date-fns"
      - "axios"
      - "uuid"
      - "crypto-js"
      - "js-cookie"
      - "qs"
    update-types:
      - "minor"
      - "patch"
    labels:
      - "utilities"
      - "helpers"

  # Group database and backend tools
  backend-tools:
    patterns:
      - "@supabase/*"
      - "supabase"
      - "redis*"
      - "pg*"
      - "postgres*"
    update-types:
      - "minor"
      - "patch"
    labels:
      - "backend"
      - "database" 