name: Bug Report
description: "Create a report to help us improve"
title: "[BUG] "
labels: ["bug"]
assignees:
  - cloudlessgr
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: Version
      description: "What version of the application are you running?"
      placeholder: "e.g., 1.0.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: "Also tell us, what did you expect to happen?"
      placeholder: "Tell us what you see!"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: "How can we reproduce this issue?"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs and/or screenshots
      description: "Please copy and paste any relevant log output. You can also drag and drop screenshots and images."
      placeholder: "Paste your logs here."
      render: shell
  - type: dropdown
    id: browsers
    attributes:
      label: Browsers
      description: "Select the browsers you are using"
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: "How severe is this bug?"
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true 