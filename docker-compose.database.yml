# Database Docker Compose for Cloudless.gr
# Standalone database services for development

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: cloudlessgr-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudless_dev}
      POSTGRES_USER: ${POSTGRES_USER:-cloudless}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-development}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
      TZ: Europe/Athens
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WAL_BUFFERS: 16MB
      POSTGRES_CHECKPOINT_SEGMENTS: 32
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/docker/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - cloudless-db-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-cloudless} -d ${POSTGRES_DB:-cloudless_dev}',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  redis-dev:
    image: redis:7-alpine
    container_name: cloudlessgr-redis-dev
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_dev_data:/data
      - redis_logs:/var/log/redis
    networks:
      - cloudless-db-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cloudlessgr-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: 'local:redis-dev:6379'
      HTTP_USER: admin
      HTTP_PASSWORD: admin
      REDIS_COMMANDER_HTTP_USER: admin
      REDIS_COMMANDER_HTTP_PASSWORD: admin
    networks:
      - cloudless-db-network
    depends_on:
      - redis-dev
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cloudlessgr-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cloudless.gr}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - cloudless-db-network
    depends_on:
      - postgres-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  redis_logs:
    driver: local
  pgadmin_data:
    driver: local

networks:
  cloudless-db-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16 