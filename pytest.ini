# Pytest Configuration for Cloudless.gr Platform
# This file configures pytest behavior for comprehensive testing

[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output and reporting
addopts =
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=.
    --cov-report=html:test-results/coverage-html
    --cov-report=xml:test-results/coverage.xml
    --cov-report=term-missing
    --html=test-results/pytest-report.html
    --self-contained-html
    --junit-xml=test-results/pytest-junit.xml
    --json-report
    --json-report-file=test-results/pytest-report.json

# Coverage configuration
[coverage:run]
source = .
omit =
    tests/*
    venv/*
    shared_venv/*
    .nuxt/*
    node_modules/*
    coverage/*
    test-results/*
    scripts/*
    */migrations/*
    */venv/*
    */env/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    api: marks tests as API tests
    database: marks tests as database tests
    docker: marks tests requiring Docker
    external: marks tests requiring external services

# Minimum version requirements
minversion = 7.0

# Test filtering
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
