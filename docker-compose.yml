version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: cloudless-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "192.168.0.23:3000:3000"  # Bind to specific IP
    environment:
      - NODE_ENV=production
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      # Add your environment variables here
      - NUXT_PUBLIC_SUPABASE_URL=${NUXT_PUBLIC_SUPABASE_URL}
      - NUXT_PUBLIC_SUPABASE_ANON_KEY=${NUXT_PUBLIC_SUPABASE_ANON_KEY}
    volumes:
      - ./logs:/app/logs
    networks:
      - cloudless-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: cloudless-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - cloudless-network
    profiles:
      - production

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: cloudless-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloudless-network
    profiles:
      - production
      - cache

  # PostgreSQL for database (if not using Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: cloudless-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudless
      POSTGRES_USER: cloudless_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudless_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cloudless-network
    profiles:
      - database

  # Development service
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cloudless-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt
    networks:
      - cloudless-network
    profiles:
      - development

networks:
  cloudless-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local 