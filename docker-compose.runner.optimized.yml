# Optimized GitHub Actions Self-Hosted Runner
# Enhanced for performance, reliability, and resource efficiency

version: '3.8'

services:
  # GitHub Actions Runner (Optimized)
  github-runner:
    image: myoung34/github-runner:latest
    container_name: cloudless-github-runner-optimized
    restart: unless-stopped
    
    # Environment configuration (Optimized)
    environment:
      # Core Runner configuration
      - REPO_URL=https://github.com/Themis128/cloudless.gr
      - RUNNER_TOKEN=${GITHUB_TOKEN}
      - RUNNER_NAME=cloudless-optimized-runner
      - RUNNER_LABELS=windows,docker,dev,self-hosted,optimized
      - RUNNER_WORKDIR=/tmp/github-runner
      - RUNNER_EPHEMERAL=true
      - RUNNER_DISABLE_AUTO_UPDATE=true
      
      # Performance optimizations
      - RUNNER_DISABLE_UPDATE=true
      - RUNNER_EPHEMERAL=true
      - RUNNER_REPLACE=true
      
      # Docker configuration
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_BUILDKIT=1
      - DOCKER_CLI_EXPERIMENTAL=enabled
      
      # Development-specific labels
      - RUNNER_GROUP=development
      - RUNNER_CUSTOM_LABELS=dev,containerized,optimized
      
      # Node.js optimizations
      - NODE_OPTIONS=--max-old-space-size=4096
      - NPM_CONFIG_CACHE=/cache/npm
      - NPM_CONFIG_PREFER_OFFLINE=true
      - NPM_CONFIG_LOGLEVEL=warn
      
      # Build optimizations
      - BUILDKIT_PROGRESS=plain
      - BUILDKIT_INLINE_CACHE=1
    
    # Volume mounts (Optimized)
    volumes:
      # Docker socket for Docker-in-Docker builds
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Persistent runner data with better organization
      - ./runner-data:/data
      
      # Optimized cache structure
      - ./runner-cache/npm:/cache/npm
      - ./runner-cache/docker:/cache/docker
      - ./runner-cache/nuxt:/cache/nuxt
      - ./runner-cache/playwright:/cache/playwright
      
      # Logs with rotation
      - ./runner-logs:/var/log/github-runner
      
      # Source code (read-only for security)
      - .:/workspace:ro
      
      # Build cache for faster rebuilds
      - build-cache:/build-cache
    
    # Network configuration (Optimized)
    networks:
      runner-network:
        ipv4_address: 172.20.0.10
    
    # Ports (Minimal for security)
    ports:
      - "127.0.0.1:8080:8080"  # Health check (localhost only)
    
    # Health check (Enhanced)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource limits (Optimized for Windows)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    
    # Logging configuration (Optimized)
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        compress: "true"
    
    # Security options (Enhanced)
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    
    # Performance optimizations
    tmpfs:
      - /tmp:size=1G
      - /var/tmp:size=1G
    
    # Environment-specific settings
    env_file:
      - .env.runner
    
    # Labels for better management
    labels:
      - "com.cloudless.runner.type=github-actions"
      - "com.cloudless.runner.version=optimized"
      - "com.cloudless.runner.environment=development"

  # Cache Management Service (Optional)
  cache-manager:
    image: alpine:latest
    container_name: cloudless-cache-manager
    restart: unless-stopped
    command: |
      sh -c "
        echo '🧹 Starting cache manager...'
        while true; do
          # Clean old cache files (older than 7 days)
          find /cache -type f -mtime +7 -delete 2>/dev/null || true
          find /cache -type d -empty -delete 2>/dev/null || true
          
          # Log cache status
          echo '📊 Cache status:'
          du -sh /cache/* 2>/dev/null || echo 'No cache data'
          
          # Wait 6 hours before next cleanup
          sleep 21600
        done
      "
    volumes:
      - ./runner-cache:/cache
    networks:
      - runner-network
    depends_on:
      - github-runner

# Networks (Optimized)
networks:
  runner-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: cloudless-runner-br0

# Volumes (Optimized)
volumes:
  build-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./runner-cache/build 