# Development Docker Compose for Cloudless.gr
# Complete stack with all supporting services and UIs

services:
  # Main Application
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
    image: cloudlessgr-app-dev:latest
    container_name: cloudlessgr-app-dev
    restart: unless-stopped

    # Network ports - accessible from specific IP
    ports:
      - '192.168.0.23:3000:3000' # Main app
      - '192.168.0.23:24678:24678' # Vite HMR
      - '192.168.0.23:9323:9323' # Prometheus metrics

    # Environment variables for optimal development
    environment:
      # Core settings
      NODE_ENV: development
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      HOST: 0.0.0.0

      # Ultra-fast file watching optimizations
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '50'
      CHOKIDAR_IGNORED: '**/node_modules/**,**/.git/**,**/.nuxt/**,**/.output/**,**/dist/**,**/coverage/**,**/tmp/**,**/logs/**,**/*.log,**/.vite/**,**/playwright-report/**'
      WATCHPACK_POLLING: 'true'
      WATCHPACK_AGGREGATE_TIMEOUT: '50'
      WATCHPACK_POLL: '500'

      # Vite optimizations for instant hot reload
      VITE_HMR_PORT: '24678'
      VITE_HMR_HOST: '0.0.0.0'
      VITE_HMR_OVERLAY: 'false'
      VITE_OPTIMIZE_DEPS_INCLUDE: 'vuetify,echarts,vue-echarts,@mdi/font'
      VITE_OPTIMIZE_DEPS_EXCLUDE: 'vue-demi'
      VITE_DEV_SERVER_WATCH_OPTIONS: 'usePolling:true,interval:50'

      # Node.js optimizations for development with parallelization
      NODE_OPTIONS: '--max-old-space-size=4096 --enable-source-maps --max-semi-space-size=512'

      # Hot reload with enhanced debugging
      NUXT_DEV_SERVER_WATCH_OPTIONS: 'usePolling:true,interval:50,followSymlinks:false,ignored:["**/node_modules/**","**/.git/**","**/.nuxt/**","**/.output/**","**/playwright-report/**"]'
      NUXT_DEV_SERVER_HMR_OPTIONS: 'port:24678,host:0.0.0.0,overlay:false,timeout:30000'

      # Development debugging
      DEBUG: 'nuxt:*,nitro:*,vite:*'

      # Timezone
      TZ: Europe/Athens

      # Service connections - Updated database configuration
      REDIS_URL: redis://redis-dev:6379
      DATABASE_URL: postgresql://cloudless:development@postgres-dev:5432/cloudless_dev
      PRISMA_DATABASE_URL: postgresql://cloudless:development@postgres-dev:5432/cloudless_dev
      POSTGRES_DB: cloudless_dev
      POSTGRES_USER: cloudless
      POSTGRES_PASSWORD: development
      POSTGRES_HOST: postgres-dev
      POSTGRES_PORT: 5432

      # External URL for proper binding
      NUXT_PUBLIC_SITE_URL: http://192.168.0.23:3000

      # Redis Configuration
      REDIS_MAX_MEMORY: 256mb

      # External API Keys (from environment)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-disabled}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-disabled}

      # Security (from environment with defaults)
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}

      # Monitoring (from environment)
      SENTRY_DSN: ${SENTRY_DSN:-disabled}
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # Development features
      NUXT_TELEMETRY_DISABLED: '1'
      NITRO_PRESET: 'node'
      NITRO_COMPRESSION: 'false'
      NITRO_MINIFY: 'false'

      # Build optimizations with parallelization
      NITRO_TIMEOUT: '300000'
      NITRO_MAX_PARALLEL: '8'
      NITRO_SOURCE_MAP: 'false'
      NITRO_DEBUG: 'false'
      NITRO_WORKERS: '4'
      NITRO_WORKER_CONCURRENCY: '2'

      # Vuetify optimizations
      VUETIFY_TREESHAKE: 'true'
      VUETIFY_OPTIMIZE_IMPORTS: 'true'
      VUETIFY_PRELOAD_COMPONENTS: 'true'
      VUETIFY_CACHE_SIZE: '1000'
      VUETIFY_DEVTOOLS: 'false'

      # Parallel processing optimizations
      UV_THREADPOOL_SIZE: '8'
      NODE_OPTIONS_EXTRA: '--experimental-worker --experimental-wasm-modules'

    # Volume mounts for development
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
      - /app/dist
      - /app/coverage
      - /app/.vite
      - /app/playwright-report

      # Cache volumes for faster builds
      - npm_cache:/root/.npm
      - nuxt_cache:/app/.nuxt
      - vite_cache:/app/.vite
      - esbuild_cache:/app/.esbuild
      - typescript_cache:/app/.tsbuildinfo
      - yarn_cache:/usr/local/share/.cache/yarn

    # Network
    networks:
      - cloudless-dev-network

    # Optimized health check for faster startup detection
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health/simple > /dev/null 2>&1 || curl -f http://localhost:3000/ > /dev/null 2>&1 || exit 1']
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s

    # Dependencies
    depends_on:
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy

    # Resources for optimal development performance
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '3.0'
        reservations:
          memory: 1G
          cpus: '1.0'

    # Development features
    stdin_open: true
    tty: true
    init: true

    # Security
    security_opt:
      - no-new-privileges:true

    # Performance optimizations
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: '512mb'

  # Redis for development
  redis-dev:
    image: redis:7-alpine
    container_name: cloudlessgr-redis-dev
    restart: unless-stopped
    command: >
      redis-server
      --appendonly no
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --loglevel warning
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --databases 16
      --maxclients 10000
      --notify-keyspace-events "Ex"
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --protected-mode no
      --bind 0.0.0.0
      --requirepass ""
    volumes:
      - redis_dev_data:/data
    networks:
      - cloudless-dev-network
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -h localhost -p 6379 --raw ping > /dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Redis Commander UI - Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cloudlessgr-redis-commander
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      REDIS_HOSTS: 'local:redis-dev:6379'
      HTTP_USER: admin
      HTTP_PASSWORD: admin
      REDIS_COMMANDER_HTTP_USER: admin
      REDIS_COMMANDER_HTTP_PASSWORD: admin
      REDIS_COMMANDER_PORT: 8081
      REDIS_COMMANDER_HOST: 0.0.0.0
    networks:
      - cloudless-dev-network
    depends_on:
      redis-dev:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # PostgreSQL Database
  postgres-dev:
    image: postgres:15-alpine
    container_name: cloudlessgr-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudless_dev
      POSTGRES_USER: cloudless
      POSTGRES_PASSWORD: development
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
      TZ: Europe/Athens
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WAL_BUFFERS: 16MB
      POSTGRES_CHECKPOINT_SEGMENTS: 32
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - cloudless-dev-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p 5432 -U cloudless -d cloudless_dev || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # pgAdmin UI - PostgreSQL Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cloudlessgr-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cloudless.gr
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - cloudless-dev-network
    depends_on:
      - postgres-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # MailHog - Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cloudlessgr-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    networks:
      - cloudless-dev-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudlessgr-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - cloudless-dev-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cloudlessgr-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - cloudless-dev-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: cloudlessgr-jaeger
    restart: unless-stopped
    ports:
      - '16686:16686' # Web UI
      - '14268:14268' # HTTP collector
      - '14250:14250' # gRPC collector
    environment:
      COLLECTOR_OTLP_ENABLED: true
    networks:
      - cloudless-dev-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # Elasticsearch - Log Aggregation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cloudlessgr-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - cloudless-dev-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Kibana - Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: cloudlessgr-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - '5601:5601'
    networks:
      - cloudless-dev-network
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Portainer - Container Management UI
  portainer:
    image: portainer/portainer-ce:latest
    container_name: cloudlessgr-portainer
    restart: unless-stopped
    ports:
      - '9000:9000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - cloudless-dev-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # Traefik - Reverse Proxy (Optional)
  traefik:
    image: traefik:v2.10
    container_name: cloudlessgr-traefik
    restart: unless-stopped
    ports:
      - '80:80'
      - '8082:8080' # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/traefik:/etc/traefik
    command:
      - '--api.dashboard=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.dashboard.address=:8080'
    networks:
      - cloudless-dev-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

networks:
  cloudless-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  redis_dev_data:
    driver: local
  postgres_dev_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  portainer_data:
    driver: local
  npm_cache:
    driver: local
  nuxt_cache:
    driver: local
  vite_cache:
    driver: local
  esbuild_cache:
    driver: local
  typescript_cache:
    driver: local
  yarn_cache:
    driver: local
