version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/jenkins.yaml:/var/jenkins_home/casc_configs/jenkins.yaml
      - ./jenkins/plugins.txt:/usr/share/jenkins/ref/plugins.txt # Auto-install plugins
      - jenkins_backup:/backup # Backup volume
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/jenkins.yaml
      - TZ=Europe/Athens
      - JAVA_OPTS=-Xmx2048m -Djenkins.install.runSetupWizard=false
      # --- SMTP (Gmail) configuration for email notifications ---
      - JENKINS_EMAIL_USER=themis.baltzakis@gmail.com
      - JENKINS_EMAIL_PASSWORD=your-app-password-here # Use a Gmail App Password, not your main password
      - JENKINS_EMAIL_SMTP_SERVER=smtp.gmail.com
      - JENKINS_EMAIL_SMTP_PORT=465
      - JENKINS_EMAIL_USE_SSL=true
      # ---------------------------------------------------------
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2g
        reservations:
          cpus: '1'
          memory: 1g
    networks:
      - app-network
    restart: unless-stopped
    #
    # After Jenkins starts, configure the Email Extension plugin in the UI:
    # - SMTP server: smtp.gmail.com
    # - User: themis.baltzakis@gmail.com
    # - Password: (Gmail App Password)
    # - Port: 465 (SSL) or 587 (TLS)
    # - Use SSL: true
    #
    # You can also automate this with JCasC if you wish.

  supabase:
    image: supabase/local:latest
    container_name: supabase
    ports:
      - "54322:5432" # Postgres
      - "54323:54323" # Studio (optional)
      - "8000:8000"   # API Gateway (optional)
    environment:
      SUPABASE_DB_PASSWORD: supabase_dev
      SUPABASE_ANON_KEY: supabase_anon_dev
      SUPABASE_SERVICE_ROLE_KEY: supabase_service_role_dev
      POSTGRES_PASSWORD: supabase_dev
      POSTGRES_DB: postgres
      # You can add more env vars as needed
    volumes:
      - supabase_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3001:3000"
    environment:
      # Nuxt specific
      NODE_ENV: development
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000

      # Auth0 Configuration
      NUXT_AUTH0_DOMAIN: ${NUXT_AUTH0_DOMAIN}
      NUXT_AUTH0_CLIENT_ID: ${NUXT_AUTH0_CLIENT_ID}
      NUXT_AUTH0_AUDIENCE: ${NUXT_AUTH0_AUDIENCE}
      NUXT_PUBLIC_URL: ${NUXT_PUBLIC_URL}

      # Database Configuration
      DATABASE_URL: ${DATABASE_URL}

      # Supabase Configuration (multiple formats for compatibility)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      NUXT_SUPABASE_URL: ${NUXT_SUPABASE_URL}
      NUXT_SUPABASE_ANON_KEY: ${NUXT_SUPABASE_ANON_KEY}
      SUPABASE_KEY: ${SUPABASE_KEY}

      # Auth Secret for JWT signing
      NUXT_AUTH_SECRET: ${NUXT_AUTH_SECRET}
      AUTH_ORIGIN: http://localhost:3001

      # Admin credentials (for development only)
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # JWT configuration for admin authentication
      NUXT_JWT_SECRET: ${NUXT_JWT_SECRET}
      NUXT_JWT_EXPIRES_IN: ${NUXT_JWT_EXPIRES_IN}
      NUXT_AUTH_COOKIE_NAME: ${NUXT_AUTH_COOKIE_NAME}

      # LLM integration
      LLM_API_URL: ${LLM_API_URL}
      LLM_MODEL: ${LLM_MODEL}

    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      jenkins:
        condition: service_healthy
      supabase:
        condition: service_healthy
    entrypoint: ["/wait-for-it.sh", "jenkins:8080", "--", "npm", "run", "dev", "--", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: 1.0
          memory: 512M
        reservations:
          cpus: 0.5
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING_DASHBOARDS=/etc/grafana/provisioning/dashboards
      - GF_PATHS_PROVISIONING_DATASOURCES=/etc/grafana/provisioning/datasources
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning-dashboards.yaml:/etc/grafana/provisioning/dashboards/default.yaml
      - ./grafana-provisioning-datasources.yaml:/etc/grafana/provisioning/datasources/default.yaml
      - ./platform-overview.json:/var/lib/grafana/dashboards/platform-overview.json
      - ./supabase-overview.json:/var/lib/grafana/dashboards/supabase-overview.json
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: 1.0
          memory: 512M
        reservations:
          cpus: 0.5
          memory: 256M

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cloudless.gr
      PGADMIN_DEFAULT_PASSWORD: admin2025
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/misc/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M
        reservations:
          cpus: 0.25
          memory: 128M

volumes:
  jenkins_home:
  jenkins_backup:
  supabase_data:
  grafana_data:
  pgadmin_data:

networks:
  app-network:
    driver: bridge
