# Simplified GitHub Actions Self-Hosted Runner
# This version doesn't depend on external services

services:
  # GitHub Actions Runner
  github-runner:
    image: myoung34/github-runner:latest
    container_name: cloudless-github-runner
    restart: unless-stopped
    
    # Environment configuration
    environment:
      # Runner configuration
      - REPO_URL=https://github.com/Themis128/cloudless.gr
      - RUNNER_TOKEN=${GITHUB_TOKEN}
      - RUNNER_NAME=cloudless-dev-runner
      - RUNNER_LABELS=linux,docker,dev,containerized,self-hosted
      - RUNNER_WORKDIR=/tmp/github-runner
      - RUNNER_EPHEMERAL=true
      - RUNNER_DISABLE_AUTO_UPDATE=true
      
      # Docker configuration (if using host Docker socket)
      - DOCKER_HOST=unix:///var/run/docker.sock
      
      # Development-specific labels
      - RUNNER_GROUP=development
      - RUNNER_CUSTOM_LABELS=dev,containerized
    
    # Volume mounts
    volumes:
      # Docker socket for Docker-in-Docker builds
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Persistent runner data
      - ./runner-data:/data
      
      # Cache for faster builds
      - ./runner-cache:/cache
      
      # Logs
      - ./runner-logs:/var/log/github-runner
      
      # Optional: Share source code for local builds
      - .:/workspace:ro
    
    # Network configuration
    networks:
      - runner-network
    
    # Ports
    ports:
      - "8080:8080"  # Runner health check
      - "8081:8081"  # Runner metrics (if available)
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Security options
    security_opt:
      - no-new-privileges:true

# Networks
networks:
  runner-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 