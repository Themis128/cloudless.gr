global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'docker'
    static_configs:
      - targets: ['app:3000']
  - job_name: 'supabase'
    static_configs:
      - targets: ['supabase:5432']
  - job_name: 'jenkins'
    static_configs:
      - targets: ['jenkins:8080']
# Add more targets as needed for other services
