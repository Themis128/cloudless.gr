<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <h1>Direct Login Test</h1>
    <button onclick="testLogin()">Test Login with Script Credentials</button>
    <div id="result"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'http://127.0.0.1:54321',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
        )

        async function testLogin() {
            const email = 'baltzakis.themis@gmail.com'
            const password = 'testpass123'
            
            console.log('Testing login with:', email)
            document.getElementById('result').innerHTML = 'Testing login...'
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                })
                
                if (error) {
                    document.getElementById('result').innerHTML = `❌ Error: ${error.message}`
                    console.error('Error:', error)
                } else {
                    document.getElementById('result').innerHTML = `✅ Success! User: ${data.user.email}`
                    console.log('Success:', data)
                }
            } catch (err) {
                document.getElementById('result').innerHTML = `❌ Exception: ${err.message}`
                console.error('Exception:', err)
            }
        }
    </script>
</body>
</html>
