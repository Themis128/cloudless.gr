version: '3.8'

services:
  # DBeaver CloudBeaver - Universal database administration tool
  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: supabase-dbeaver
    ports:
      - '8081:8978'
    volumes:
      - dbeaver_data:/opt/cloudbeaver/workspace
      - ./db-backups:/backups
      - ./sync-scripts:/scripts
    networks:
      - supabase_default
    restart: unless-stopped
    environment:
      - CB_SERVER_NAME=Supabase Admin
      - CB_ADMIN_NAME=admin
      - CB_ADMIN_PASSWORD=admin123

  # Enhanced sync service with cron scheduling
  sync-scheduler:
    image: postgres:15
    container_name: supabase-sync-scheduler
    environment:
      PGPASSWORD: postgres
      CLOUD_DB_PASSWORD: supabase2025
      CLOUD_PROJECT_REF: oflctqligzouzshimuqh
      CLOUD_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mbGN0cWxpZ3pvdXpzaGltdXFoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc0ODgxNDc0NSwiZXhwIjoyMDY0MzkwNzQ1fQ.Sm4HwwS-MJw5KM96eJF5_aCOuv-I-v9Gohnmxo7cMXY
    volumes:
      - ./sync-scripts:/scripts
      - ./db-backups:/backups
      - ./logs:/logs
      - /var/run/docker.sock:/var/run/docker.sock # Allow container to run docker commands
    networks:
      - supabase_default
    working_dir: /scripts
    command: |
      bash -c "
        apt-get update && apt-get install -y cron curl docker.io &&
        echo '0 */6 * * * /scripts/automated-sync.sh >> /logs/sync.log 2>&1' | crontab - &&
        cron && tail -f /dev/null
      "
    restart: unless-stopped

volumes:
  dbeaver_data:

networks:
  supabase_default:
    external: true
