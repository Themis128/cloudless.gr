# SonarQube Cloud Configuration for CloudlessGR
# Project: Nuxt 3 + TypeScript + Vue + Vuetify + Supabase

# Project identification
sonar.projectKey=Themis128_cloudless.gr
sonar.organization=themis128

# Project metadata
sonar.projectName=CloudlessGR
sonar.projectDescription=Modern full-stack development environment using Nuxt.js and Supabase with Docker containerization
sonar.projectVersion=1.0.0

# Source configuration
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Branch configuration - Set 'application' as main branch
sonar.branch.name=application

# Language-specific configurations
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=test-results/sonar-report.xml

# Inclusions and exclusions
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx,**/*.vue,**/*.json,**/*.yaml,**/*.yml
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.nuxt/**,**/.output/**,**/coverage/**,**/test-results/**,**/cypress/**,**/playwright/**,**/*.min.js,**/*.min.css,**/vendor/**,**/public/**,**/static/**,**/docker/**,**/db-backups/**,**/logs/**,**/scripts/**/*.ps1

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js,**/*.test.vue,**/*.spec.vue
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**

# Quality gate and rules
sonar.qualitygate.wait=true

# TypeScript specific settings
sonar.typescript.node=node
sonar.typescript.tsconfigPath=tsconfig.json

# Vue.js specific settings
sonar.vue.file.suffixes=.vue

# Security and maintainability
sonar.security.hotspots.inheritFromParent=false
sonar.coverage.exclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js,**/*.config.ts,**/*.config.js,**/types/**,**/interfaces/**

# Links
sonar.links.homepage=https://github.com/Themis128/cloudless.gr
sonar.links.ci=https://github.com/Themis128/cloudless.gr/actions
sonar.links.scm=https://github.com/Themis128/cloudless.gr
sonar.links.issue=https://github.com/Themis128/cloudless.gr/issues
