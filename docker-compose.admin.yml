version: '3.8'

services:
  # pgAdmin - Web-based PostgreSQL administration
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: supabase-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cloudless.gr
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_LISTEN_ADDRESS: '0.0.0.0'
      PGADMIN_LISTEN_PORT: 80
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./db-backups:/backups
      - ./pgadmin-config/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin-config/pgpass:/pgpass:ro
      - ./pgadmin-config/sql-scripts:/sql-scripts:ro
    networks:
      - supabase_default
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    depends_on:
      - db-sync

  # Optional: Database synchronization service
  db-sync:
    image: postgres:15
    container_name: supabase-sync-service
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./sync-scripts:/scripts
      - ./db-backups:/backups
      - ./logs:/logs
    networks:
      - supabase_default
    working_dir: /scripts
    command: tail -f /dev/null # Keep container running
    restart: unless-stopped

volumes:
  pgadmin_data:

networks:
  supabase_default:
    external: true
