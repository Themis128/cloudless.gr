# ====================================
# ADMIN TOOLS ACCESS
# ====================================
[admin]
# pgAdmin Web Interface
pgadmin_url = http://localhost:8080
pgadmin_email = admin@cloudless.gr
pgadmin_password = admin123
pgadmin_default_email = pgadmin4@pgadmin.org
pgadmin_config_mode = standalone

# Database Access via pgAdmin
pgadmin_local_server_name = Local Supabase
pgadmin_local_server_host = supabase-db
pgadmin_local_server_port = 5432
pgadmin_local_server_db = postgres
pgadmin_local_server_user = postgres
pgadmin_local_server_password = postgres

pgadmin_cloud_server_name = Cloud Supabase
pgadmin_cloud_server_host = db.oflctqligzouzshimuqh.supabase.co
pgadmin_cloud_server_port = 5432
pgadmin_cloud_server_db = postgres
pgadmin_cloud_server_user = postgres
pgadmin_cloud_server_password = supabase2025

# DBeaver (Optional)
dbeaver_url = http://localhost:8081

# ====================================
# SYNC CONFIGURATION
# ====================================
[sync]
schedule = "0 */6 * * *"  # Every 6 hours
backup_retention_days = 7
tables_to_sync = profiles,userinfo,projects,user_sessions,audit_logs
include_auth_by_default = false

# ====================================
# PGADMIN SERVER CONFIGURATION
# ====================================
[pgadmin_servers]
# Servers are automatically loaded from pgadmin-config/servers.json
# Manual loading command: docker exec supabase-pgadmin /venv/bin/python /pgadmin4/setup.py load-servers /pgadmin4/servers.json --user admin@cloudless.gr
servers_config_file = pgadmin-config/servers.json
auto_load_on_startup = true

# DNS Configuration (Fixed for cloud database access)
# Custom DNS servers (8.8.8.8, 1.1.1.1) added to docker-compose.admin.yml to resolve cloud hostname
dns_servers = 8.8.8.8,1.1.1.1
cloud_hostname_resolution = fixed

# Server themes for easy identification
local_server_theme_bg = #1a472a
local_server_theme_fg = #ffffff
cloud_server_theme_bg = #8b1538
cloud_server_theme_fg = #ffffff

# Available SQL scripts in pgAdmin
sql_scripts_path = /sql-scripts
health_check_script = database-overview.sql
schema_comparison_script = schema-comparison.sql
data_verification_script = data-verification.sql
