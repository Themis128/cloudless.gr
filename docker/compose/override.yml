version: "3.8"
services:
  auth-master:
    image: auth-master:v2
    container_name: auth-master
    depends_on:
      - db
    ports:
      - "9999:9999"
    environment:
      - GOTRUE_SITE_URL=http://localhost:3000
      - GOTRUE_JWT_SECRET=your_jwt_secret
      - GOTRUE_DB_MIGRATIONS_PATH=/go/src/github.com/supabase/auth/migrations
      - GOTRUE_DB_DRIVER=postgres
      - DATABASE_URL=postgres://supabase_admin:postgres@db:5432/postgres
      - GOTRUE_API_HOST=0.0.0.0
      - API_EXTERNAL_URL=http://192.168.0.23:9999
      - PORT=9999
    volumes:
      - ../auth-master:/go/src/github.com/supabase/auth
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "54322:5432"
