# Redis Configuration for Cloudless LLM Dev Agent
# Optimized for development and production use

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# =============================================================================
# GENERAL CONFIGURATION
# =============================================================================
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================
# Memory limit (adjust based on your needs)
maxmemory 512mb

# Memory policy for eviction
maxmemory-policy allkeys-lru

# Memory optimization
maxmemory-samples 5
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 25
active-defrag-cycle-max 75

# =============================================================================
# PERSISTENCE CONFIGURATION
# =============================================================================
# RDB Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# =============================================================================
# REPLICATION CONFIGURATION
# =============================================================================
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
# Password protection (set via environment variable)
# requirepass ${REDIS_PASSWORD}

# Protected mode
protected-mode no

# =============================================================================
# CLIENT CONFIGURATION
# =============================================================================
maxclients 10000
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# =============================================================================
# PERFORMANCE OPTIMIZATION
# =============================================================================
# TCP settings
tcp-keepalive 300
tcp-backlog 511

# Hash optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimization
list-max-ziplist-size -2
list-compress-depth 0

# Set optimization
set-max-intset-entries 512

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog optimization
hll-sparse-max-bytes 3000

# Stream optimization
stream-node-max-bytes 4096
stream-node-max-entries 100

# =============================================================================
# SLOW LOG CONFIGURATION
# =============================================================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# =============================================================================
# LATENCY MONITORING
# =============================================================================
latency-monitor-threshold 100

# =============================================================================
# EVENT NOTIFICATION
# =============================================================================
notify-keyspace-events "Ex"

# =============================================================================
# ADVANCED CONFIGURATION
# =============================================================================
# Lua scripting
lua-time-limit 5000

# Cluster mode (disabled for standalone)
cluster-enabled no

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
# Log queries that take more than 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# =============================================================================
# CUSTOM SETTINGS FOR LLM DEVELOPMENT
# =============================================================================
# Optimize for caching operations
maxmemory-policy allkeys-lru

# Enable lazy freeing for better performance
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Optimize for high-throughput scenarios
tcp-keepalive 300
tcp-backlog 511

# Enable AOF rewrite for better performance
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb 