# Redis Monitoring Configuration
# This file contains monitoring and alerting settings for Redis

# =============================================================================
# MONITORING SETTINGS
# =============================================================================

# Enable detailed monitoring
latency-monitor-threshold 50

# Slow log configuration for monitoring
slowlog-log-slower-than 5000
slowlog-max-len 256

# Event notifications for monitoring
notify-keyspace-events "Ex"

# =============================================================================
# PERFORMANCE THRESHOLDS
# =============================================================================

# Memory usage thresholds
# Alert when memory usage exceeds 80%
maxmemory-policy allkeys-lru

# Connection limits
maxclients 10000

# =============================================================================
# LOGGING FOR MONITORING
# =============================================================================

# Log level for monitoring
loglevel notice

# Enable detailed logging
# logfile "/var/log/redis/redis.log"

# =============================================================================
# HEALTH CHECK SETTINGS
# =============================================================================

# TCP keepalive for health checks
tcp-keepalive 300

# Timeout settings
timeout 0

# =============================================================================
# METRICS COLLECTION
# =============================================================================

# Enable all metrics collection
# This allows monitoring tools to collect comprehensive metrics

# =============================================================================
# ALERTING CONFIGURATION
# =============================================================================

# Memory usage alerts
# - Warning at 70% usage
# - Critical at 85% usage

# Connection alerts
# - Warning at 80% of maxclients
# - Critical at 95% of maxclients

# Performance alerts
# - Warning for queries > 100ms
# - Critical for queries > 1000ms

# =============================================================================
# MONITORING TOOLS INTEGRATION
# =============================================================================

# Redis Commander settings
# Access via http://localhost:8081

# Prometheus metrics (if using Redis Exporter)
# Metrics endpoint: /metrics

# Grafana dashboard configuration
# Dashboard ID: Redis

# =============================================================================
# CUSTOM MONITORING SCRIPTS
# =============================================================================

# Use the optimize-redis.ps1 script for:
# - Real-time monitoring
# - Performance optimization
# - Memory analysis
# - Key statistics
# - Slow query analysis 