# Redis Production Configuration for Cloudless LLM Dev Agent
# Optimized for production deployment with enhanced security and performance

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# =============================================================================
# GENERAL CONFIGURATION
# =============================================================================
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# =============================================================================
# MEMORY MANAGEMENT (PRODUCTION OPTIMIZED)
# =============================================================================
# Memory limit (adjust based on available RAM)
maxmemory 1gb

# Memory policy for eviction (optimized for caching)
maxmemory-policy allkeys-lru

# Memory optimization
maxmemory-samples 10
activedefrag yes
active-defrag-ignore-bytes 200mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 25
active-defrag-cycle-max 75

# =============================================================================
# PERSISTENCE CONFIGURATION (PRODUCTION)
# =============================================================================
# RDB Persistence (more frequent saves for production)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF Persistence (enhanced for production)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# =============================================================================
# SECURITY CONFIGURATION (PRODUCTION)
# =============================================================================
# Password protection (MANDATORY for production)
requirepass ${REDIS_PASSWORD}

# Protected mode
protected-mode yes

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command SHUTDOWN ""

# =============================================================================
# CLIENT CONFIGURATION (PRODUCTION)
# =============================================================================
maxclients 10000
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# =============================================================================
# PERFORMANCE OPTIMIZATION (PRODUCTION)
# =============================================================================
# TCP settings
tcp-keepalive 300
tcp-backlog 511

# Hash optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimization
list-max-ziplist-size -2
list-compress-depth 0

# Set optimization
set-max-intset-entries 512

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog optimization
hll-sparse-max-bytes 3000

# Stream optimization
stream-node-max-bytes 4096
stream-node-max-entries 100

# =============================================================================
# MONITORING AND LOGGING (PRODUCTION)
# =============================================================================
# Slow log configuration
slowlog-log-slower-than 5000
slowlog-max-len 256

# Latency monitoring
latency-monitor-threshold 50

# Event notification
notify-keyspace-events "Ex"

# =============================================================================
# ADVANCED CONFIGURATION (PRODUCTION)
# =============================================================================
# Lua scripting
lua-time-limit 5000

# Cluster mode (disabled for standalone)
cluster-enabled no

# =============================================================================
# PRODUCTION-SPECIFIC OPTIMIZATIONS
# =============================================================================
# Optimize for high-throughput caching
maxmemory-policy allkeys-lru

# Enable lazy freeing for better performance
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Optimize for high-throughput scenarios
tcp-keepalive 300
tcp-backlog 511

# Enhanced AOF settings for production
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# =============================================================================
# LLM DEVELOPMENT OPTIMIZATIONS
# =============================================================================
# Optimize for model inference caching
maxmemory-policy allkeys-lru

# Optimize for pipeline execution data
hash-max-ziplist-entries 1024
hash-max-ziplist-value 128

# Optimize for analytics data
set-max-intset-entries 1024

# Optimize for session management
list-max-ziplist-size -2
list-compress-depth 0

# =============================================================================
# MONITORING AND METRICS
# =============================================================================
# Enable detailed monitoring
latency-monitor-threshold 50

# Enhanced slow log for debugging
slowlog-log-slower-than 5000
slowlog-max-len 256

# Event notifications for monitoring
notify-keyspace-events "Ex" 