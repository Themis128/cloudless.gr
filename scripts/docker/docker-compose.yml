# Default Docker Compose Configuration
# This file serves as the default compose file
# For development, use: docker compose -f docker-compose.dev.yml
# For production, use: docker compose -f docker-compose.prod.yml

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: cloudlessgr-app:${VERSION:-latest}
    container_name: cloudlessgr-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      # Application configuration
      - NODE_ENV=production
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NITRO_LOG_LEVEL=info
      # Ensure Supabase environment variables are passed through
      - NUXT_PUBLIC_SUPABASE_URL=${NUXT_PUBLIC_SUPABASE_URL}
      - NUXT_PUBLIC_SUPABASE_ANON_KEY=${NUXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://192.168.0.23:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - cloudless-network

  nginx:
    image: nginx:alpine
    container_name: cloudlessgr-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - cloudless-network

networks:
  cloudless-network:
    driver: bridge

volumes:
  logs:
