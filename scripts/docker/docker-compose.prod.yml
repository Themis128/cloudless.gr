version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: cloudlessgr-app:${IMAGE_TAG:-latest}
    container_name: cloudlessgr-app-prod
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      # Application Configuration
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000

      # Supabase Configuration (from GitHub secrets)
      NUXT_PUBLIC_SUPABASE_URL: ${NUXT_PUBLIC_SUPABASE_URL}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${NUXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # Database Configuration (from GitHub secrets)
      DATABASE_URL: ${DATABASE_URL}

      # Redis Configuration (from GitHub secrets)
      REDIS_URL: ${REDIS_URL}
      REDIS_MAX_MEMORY: ${REDIS_MAX_MEMORY:-256mb}

      # External API Keys (from GitHub secrets)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Security (from GitHub secrets)
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}

      # Monitoring (from GitHub secrets)
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: info

      # Application Metadata
      APP_VERSION: ${APP_VERSION:-1.0.0}
      GIT_COMMIT: ${GITHUB_SHA:-unknown}
      BUILD_DATE: ${BUILD_DATE:-unknown}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - cloudless-prod-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://192.168.0.23:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: cloudlessgr-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-production} --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - cloudless-prod-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: cloudlessgr-nginx-prod
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
      - '${NGINX_SSL_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
    networks:
      - cloudless-prod-network
    depends_on:
      - app
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local

networks:
  cloudless-prod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
