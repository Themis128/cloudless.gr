global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cloudless-prod'
    env: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts.yml'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Cloudless.gr Application
  - job_name: 'cloudlessgr-app'
    static_configs:
      - targets: ['app-dev:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s

  # Node.js Application Metrics
  - job_name: 'nodejs'
    static_configs:
      - targets: ['app-dev:9323']
    scrape_interval: 10s

  # Redis Metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-dev:6379']
    scrape_interval: 10s

  # PostgreSQL Metrics (if using postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-dev:5432']
    scrape_interval: 30s

  # Docker Metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
    scrape_interval: 15s

  # Health Checks
  - job_name: 'health-checks'
    static_configs:
      - targets: ['app-dev:3000']
    metrics_path: '/api/health'
    scrape_interval: 30s
