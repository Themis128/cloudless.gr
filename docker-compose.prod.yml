version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/jenkins.yaml:/var/jenkins_home/casc_configs/jenkins.yaml
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/jenkins.yaml
      # --- SMTP (Gmail) configuration for email notifications ---
      - JENKINS_EMAIL_USER=themis.baltzakis@gmail.com
      - JENKINS_EMAIL_PASSWORD=your-app-password-here # Use a Gmail App Password, not your main password
      - JENKINS_EMAIL_SMTP_SERVER=smtp.gmail.com
      - JENKINS_EMAIL_SMTP_PORT=465
      - JENKINS_EMAIL_USE_SSL=true
      # ---------------------------------------------------------
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped
    #
    # After Jenkins starts, configure the Email Extension plugin in the UI:
    # - SMTP server: smtp.gmail.com
    # - User: themis.baltzakis@gmail.com
    # - Password: (Gmail App Password)
    # - Port: 465 (SSL) or 587 (TLS)
    # - Use SSL: true
    #
    # You can also automate this with JCasC if you wish.

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    environment:
      # Nuxt specific
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000

      # Auth0 Configuration
      NUXT_AUTH0_DOMAIN: ${NUXT_AUTH0_DOMAIN}
      NUXT_AUTH0_CLIENT_ID: ${NUXT_AUTH0_CLIENT_ID}
      NUXT_AUTH0_AUDIENCE: ${NUXT_AUTH0_AUDIENCE}
      NUXT_PUBLIC_URL: ${NUXT_PUBLIC_URL}

      # Database Configuration
      DATABASE_URL: ${DATABASE_URL}

      # Supabase Configuration (multiple formats for compatibility)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      NUXT_SUPABASE_URL: ${NUXT_SUPABASE_URL}
      NUXT_SUPABASE_ANON_KEY: ${NUXT_SUPABASE_ANON_KEY}
      SUPABASE_KEY: ${SUPABASE_KEY}

      # Auth Secret for JWT signing
      NUXT_AUTH_SECRET: ${NUXT_AUTH_SECRET}
      AUTH_ORIGIN: ${NUXT_PUBLIC_URL:-https://www.cloudless.gr}

      # Admin credentials
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # JWT configuration for admin authentication
      NUXT_JWT_SECRET: ${NUXT_JWT_SECRET}
      NUXT_JWT_EXPIRES_IN: ${NUXT_JWT_EXPIRES_IN}
      NUXT_AUTH_COOKIE_NAME: ${NUXT_AUTH_COOKIE_NAME}

      # LLM integration
      LLM_API_URL: ${LLM_API_URL}
      LLM_MODEL: ${LLM_MODEL}

    volumes:
      - ./data:/app/data
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      jenkins:
        condition: service_healthy
      minio:
        condition: service_started
    entrypoint: ["/wait-for-it.sh", "jenkins:8080", "--", "node", ".output/server/index.mjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env

  app-blue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: cloudless-app:blue
    environment:
      # Nuxt specific
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000

      # Auth0 Configuration
      NUXT_AUTH0_DOMAIN: ${NUXT_AUTH0_DOMAIN}
      NUXT_AUTH0_CLIENT_ID: ${NUXT_AUTH0_CLIENT_ID}
      NUXT_AUTH0_AUDIENCE: ${NUXT_AUTH0_AUDIENCE}
      NUXT_PUBLIC_URL: ${NUXT_PUBLIC_URL}

      # Database Configuration
      DATABASE_URL: ${DATABASE_URL}

      # Supabase Configuration (multiple formats for compatibility)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      NUXT_SUPABASE_URL: ${NUXT_SUPABASE_URL}
      NUXT_SUPABASE_ANON_KEY: ${NUXT_SUPABASE_ANON_KEY}
      SUPABASE_KEY: ${SUPABASE_KEY}

      # Auth Secret for JWT signing
      NUXT_AUTH_SECRET: ${NUXT_AUTH_SECRET}
      AUTH_ORIGIN: ${NUXT_PUBLIC_URL:-https://www.cloudless.gr}

      # Admin credentials
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # JWT configuration for admin authentication
      NUXT_JWT_SECRET: ${NUXT_JWT_SECRET}
      NUXT_JWT_EXPIRES_IN: ${NUXT_JWT_EXPIRES_IN}
      NUXT_AUTH_COOKIE_NAME: ${NUXT_AUTH_COOKIE_NAME}

      # LLM integration
      LLM_API_URL: ${LLM_API_URL}
      LLM_MODEL: ${LLM_MODEL}

    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      supabase:
        condition: service_healthy

  app-green:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: cloudless-app:green
    environment:
      # Nuxt specific
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000

      # Auth0 Configuration
      NUXT_AUTH0_DOMAIN: ${NUXT_AUTH0_DOMAIN}
      NUXT_AUTH0_CLIENT_ID: ${NUXT_AUTH0_CLIENT_ID}
      NUXT_AUTH0_AUDIENCE: ${NUXT_AUTH0_AUDIENCE}
      NUXT_PUBLIC_URL: ${NUXT_PUBLIC_URL}

      # Database Configuration
      DATABASE_URL: ${DATABASE_URL}

      # Supabase Configuration (multiple formats for compatibility)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      NUXT_SUPABASE_URL: ${NUXT_SUPABASE_URL}
      NUXT_SUPABASE_ANON_KEY: ${NUXT_SUPABASE_ANON_KEY}
      SUPABASE_KEY: ${SUPABASE_KEY}

      # Auth Secret for JWT signing
      NUXT_AUTH_SECRET: ${NUXT_AUTH_SECRET}
      AUTH_ORIGIN: ${NUXT_PUBLIC_URL:-https://www.cloudless.gr}

      # Admin credentials
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # JWT configuration for admin authentication
      NUXT_JWT_SECRET: ${NUXT_JWT_SECRET}
      NUXT_JWT_EXPIRES_IN: ${NUXT_JWT_EXPIRES_IN}
      NUXT_AUTH_COOKIE_NAME: ${NUXT_AUTH_COOKIE_NAME}

      # LLM integration
      LLM_API_URL: ${LLM_API_URL}
      LLM_MODEL: ${LLM_MODEL}

    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      supabase:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-bluegreen.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
    depends_on:
      - app-blue
      - app-green
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${ADMIN_EMAIL:-admin@cloudless.gr}
      MINIO_ROOT_PASSWORD: ${ADMIN_PASSWORD:-cloudless2025}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  jenkins_home:
  minio_data:

networks:
  app-network:
    driver: bridge
